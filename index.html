<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Warehouse — Operations & Control (Firebase)</title>
  <style>:root{
    --bg:#f6f7fb;
    --surface:#ffffff;
    --surface2:#fbfbfe;
    --stroke:rgba(20,24,33,.12);
    --line:rgba(20,24,33,.12);
    --text:#101624;
    --muted:#5b677a;
    --accent:#1f8a70;   /* verde/teal */
    --ok:#178f63;
    --danger:#d64545;
    --warn:#b88300;
    --radius:16px;
    --shadow:0 8px 28px rgba(16,22,36,.06);
  }
  *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif}
  body{margin:0;background:linear-gradient(180deg,var(--bg),#ffffff);color:var(--text)}
  :root{--app-header-h:0px}
  #appShell > header{position:fixed !important;top:0;left:0;right:0;width:100%;z-index:10000 !important;background:rgba(246,247,251,.98);backdrop-filter:blur(10px);border-bottom:1px solid var(--stroke);box-shadow:0 2px 14px rgba(16,22,36,.04)}
  #appShell > .wrap{padding-top:calc(var(--app-header-h,0px) + 12px) !important}
  #appShell > header .tabs{position:static !important}
  html{scroll-padding-top:calc(var(--app-header-h,0px) + 18px)}
  [id]{scroll-margin-top:calc(var(--app-header-h,0px) + 18px)}
  header{position:sticky;top:0;z-index:1200;background:rgba(246,247,251,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--stroke)}
  .wrap{max-width:1100px;margin:0 auto;padding:12px 14px}
  h1{margin:0;font-size:15px;letter-spacing:.2px}
  h2{margin:0 0 8px;font-size:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .spacer{flex:1}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tabbtn{
    border:1px solid var(--stroke);
    background:#ffffff;
    color:var(--text);
    padding:10px 12px;
    border-radius:999px;
    cursor:pointer;
    font-weight:700;
    letter-spacing:.2px;
  }
  .tabbtn.active{
    border-color:rgba(31,138,112,.55);
    box-shadow:0 0 0 3px rgba(31,138,112,.14) inset;
    background:rgba(31,138,112,.10);
  }
  .card{
    background:var(--surface);
    border:1px solid var(--stroke);
    border-radius:var(--radius);
    padding:14px;
    box-shadow:0 8px 28px rgba(16,22,36,.06);
  }
  .card.soft{background:var(--surface2)}
  .grid{display:grid;gap:12px}
  @media(min-width:980px){ .grid.two{grid-template-columns:1fr 1fr} }
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
  input,select{
    width:100%; padding:12px 12px; border-radius:14px;
    background:#ffffff;
    border:1px solid rgba(20,24,33,.18);
    color:var(--text); outline:none;
  }
  input:focus, select:focus{border-color:rgba(31,138,112,.55); box-shadow:0 0 0 3px rgba(31,138,112,.14)}
  .btn{
    padding:12px 12px;border-radius:14px;border:1px solid rgba(20,24,33,.16);
    background:rgba(31,138,112,.12);color:var(--text);cursor:pointer;
    font-weight:800;
  }
  .btn:hover{filter:brightness(1.03)}
  .btn.ok{background:rgba(23,143,99,.14)}
  .btn.ghost{background:#ffffff}
  .btn.danger{background:rgba(214,69,69,.12)}
  .hint{font-size:12px;color:var(--muted);line-height:1.45}
  .msg{margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid rgba(20,24,33,.14);background:rgba(16,22,36,.03);font-size:13px}
  .msg.ok{border-color:rgba(23,143,99,.28); background:rgba(23,143,99,.08)}
  .msg.err{border-color:rgba(214,69,69,.28); background:rgba(214,69,69,.08)}
  .msg.warn{border-color:rgba(184,131,0,.28); background:rgba(184,131,0,.08)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  .right{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
  .pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border-radius:999px;background:rgba(16,22,36,.03);border:1px solid rgba(20,24,33,.12);font-size:12px}
  .divider{height:1px;background:rgba(20,24,33,.10);margin:12px 0}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border-bottom:1px solid rgba(20,24,33,.10);padding:10px 8px;text-align:left;vertical-align:top}
  th{font-size:12px;color:var(--muted);font-weight:800;position:sticky;top:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px)}
  code{background:rgba(16,22,36,.05);padding:2px 6px;border-radius:8px}
  .step{
    display:flex;gap:10px;align-items:flex-start;
    padding:10px 12px;border-radius:16px;border:1px dashed rgba(20,24,33,.18);
    background:rgba(16,22,36,.02);
    margin-top:10px;
  }
  .step .n{
    width:26px;height:26px;border-radius:999px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(31,138,112,.12);border:1px solid rgba(31,138,112,.25);
    font-weight:900;color:var(--accent);
  }
  .step .t{font-weight:850}
  .step .d{font-size:12px;color:var(--muted);line-height:1.35;margin-top:2px}
  @media(max-width:820px){
    .wrap{max-width:720px}
    .tabbtn{padding:12px 14px;font-size:16px}
    input,select{padding:14px 14px;font-size:16px}
    .btn{padding:14px 14px;font-size:16px}
    .field{min-width:100% !important}
    th{position:static}
  }
  .field{flex:1;min-width:220px}

  /* ===== Operação (Mobile-first) ===== */
  .opMobile .row{align-items:stretch}
  .opMobile .right{justify-content:stretch}
  .opMobile .right .btn{flex:1}
  .opMobile .btn{min-height:48px}
  .opMobile input, .opMobile select{min-height:48px}
  .opMobile .hint{font-size:13px}
  .opMobile h2{font-size:18px}
  .opMobile label{font-size:13px}
  .opMobile .card{padding:14px}
  .opMobile .step{border-style:solid}
  @media(max-width:820px){
    .opMobile .row{flex-direction:column;gap:10px}
    .opMobile .field{min-width:100% !important}
    .opMobile .btn{width:100%}
    .opMobile input, .opMobile select{font-size:18px}
    .opMobile .tabbtn{font-size:16px}
    .opMobile .card{border-radius:18px}
  }


  /* ===== Operação Mobile: menu + ecrã único ===== */
  .opMenuGrid{display:grid;gap:12px}
  .opMenuBtn{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 14px;border:1px solid var(--line);border-radius:16px;background:#fff;cursor:pointer}
  .opMenuBtn .k{font-weight:800}
  .opMenuBtn .s{color:var(--muted);font-size:13px}
  .opTopbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .opBack{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 12px;cursor:pointer}
  .opBack:active{transform:scale(.99)}
  @media(max-width:820px){
    .opTabsRow{display:none !important}
    .opMenuBtn{min-height:62px}
    .opMenuBtn .k{font-size:18px}
  }


  /* ===== Login Fullscreen Gate ===== */
  #appShell{display:none}
  #loginScreen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;padding:18px;z-index:9999}
  #loginCard{width:min(520px,100%);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
  #loginCard h2{margin:0 0 6px}
  #loginCard .hint{margin:0 0 12px}
  #userCorner{display:none;gap:10px;align-items:center}
  @media(max-width:820px){
    #loginCard{border-radius:22px}
  }



/* MOBILE BOOST */
@media (max-width: 820px){
  :root{ --pad: 14px; }
  body{ font-size: 16px; }
  .app{ padding: 10px; }
  .card{ border-radius: 16px; }
  .tabs{ position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.95); backdrop-filter: blur(8px); }
  #appShell > header .tabs{ position: static !important; top:auto !important; }
  .tabbtn{ padding: 12px 12px; font-size: 15px; }
  input, select, textarea{ font-size: 18px; height: 48px; }
  textarea{ height: auto; }
  .btn{ min-height: 48px; padding: 12px 14px; font-size: 16px; }
  .row{ gap: 10px; }
  .hint{ font-size: 13px; line-height: 1.3; }
}

  /* ===== Mapa Armazém (novo separador) ===== */
  #mapPage{
    --map-bg:#0e0f11;
    --map-surface:#16181c;
    --map-surface2:#1e2026;
    --map-border:rgba(255,255,255,.10);
    --map-text:#f0f2f5;
    --map-muted:#8a91a4;
    --map-accent:#f0c040;
    --map-ok:#3ecf8e;
    --map-warn:#f0c040;
    --map-danger:#ff5e5e;
    --map-picking:#7b9cff;
    --map-empty:#2a2d35;
    --map-corridor:#0e0f11;
    background:var(--map-bg);
    color:var(--map-text);
    border-radius:18px;
    padding:14px;
    border:1px solid rgba(0,0,0,.06);
    box-shadow:var(--shadow);
  }
  #mapPage *{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  #mapPage .map-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  #mapPage .map-brand{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;font-size:18px;font-weight:900;letter-spacing:-.4px}
  #mapPage .map-brand span{color:var(--map-accent)}
  #mapPage .map-pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--map-border);font-size:12px;color:var(--map-muted)}
  #mapPage .map-pill.ok{background:rgba(62,207,142,.10);border-color:rgba(62,207,142,.30);color:var(--map-ok)}
  #mapPage .map-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #mapPage .map-btn{padding:10px 12px;border-radius:12px;border:1px solid var(--map-border);background:rgba(255,255,255,.07);color:var(--map-text);cursor:pointer;font-weight:800}
  #mapPage .map-btn.primary{background:var(--map-accent);color:#000;border-color:transparent}
  #mapPage .map-btn:hover{filter:brightness(1.08)}
  #mapPage .map-config{display:none;background:var(--map-surface);border:1px solid var(--map-border);border-radius:14px;padding:14px;margin-bottom:14px}
  #mapPage .map-config h3{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;font-size:15px;margin:0 0 10px;color:var(--map-accent)}
  #mapPage .map-config p{font-size:12px;color:var(--map-muted);line-height:1.45;margin:0 0 12px}
  #mapPage .map-cfg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
  #mapPage .map-cfg-cell{background:var(--map-surface2);border:1px solid var(--map-border);border-radius:10px;padding:10px}
  #mapPage .map-cfg-cell .pos-label{font-size:11px;color:var(--map-muted);margin-bottom:6px;text-transform:uppercase}
  #mapPage .map-cfg-cell input,
  #mapPage #mapAllVal{padding:8px 10px;border-radius:8px;border:1px solid var(--map-border);background:var(--map-bg);color:var(--map-text);font-size:14px;text-align:center;outline:none}
  #mapPage .map-cfg-cell input{width:100%}
  #mapPage .map-cfg-cell input:focus,
  #mapPage #mapAllVal:focus{border-color:var(--map-accent)}
  #mapPage .map-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
  #mapPage .map-stat{background:var(--map-surface);border:1px solid var(--map-border);border-radius:12px;padding:13px}
  #mapPage .map-stat .n{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;font-size:26px;font-weight:900}
  #mapPage .map-stat .l{font-size:11px;color:var(--map-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  #mapPage .n.ok{color:var(--map-ok)} #mapPage .n.warn{color:var(--map-warn)} #mapPage .n.danger{color:var(--map-danger)} #mapPage .n.pick{color:var(--map-picking)}
  #mapPage .map-legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:12px 14px;background:var(--map-surface);border:1px solid var(--map-border);border-radius:12px;margin-bottom:14px;font-size:12px}
  #mapPage .map-leg-item{display:flex;align-items:center;gap:7px}
  #mapPage .map-leg-dot{width:14px;height:14px;border-radius:4px}
  #mapPage .map-wrap{overflow-x:auto;padding-bottom:8px}
  #mapPage .wh-map{display:inline-flex;flex-direction:column;gap:0;min-width:620px;width:100%}
  #mapPage .wh-row{display:flex;align-items:stretch;gap:0}
  #mapPage .row-label{width:38px;min-width:38px;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;font-size:20px;font-weight:900;color:var(--map-accent);letter-spacing:-1px}
  #mapPage .corridor-v{width:32px;min-width:32px;background:var(--map-corridor);display:flex;align-items:center;justify-content:center}
  #mapPage .corridor-v-inner{writing-mode:vertical-rl;font-size:9px;color:rgba(255,255,255,.16);text-transform:uppercase;letter-spacing:2px}
  #mapPage .slot{flex:1;border-radius:10px;border:2px solid transparent;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative}
  #mapPage .slot:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.42);z-index:2}
  #mapPage .slot .slot-id{font-size:10px;color:rgba(255,255,255,.48)}
  #mapPage .slot .slot-count{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;font-size:23px;font-weight:900}
  #mapPage .slot .slot-cap{font-size:10px;color:rgba(255,255,255,.44)}
  #mapPage .slot .slot-type{font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:4px;margin-top:2px}
  #mapPage .slot.empty{background:var(--map-empty);border-color:rgba(255,255,255,.06)}
  #mapPage .slot.empty .slot-count{color:rgba(255,255,255,.22)}
  #mapPage .slot.partial{background:rgba(240,192,64,.08);border-color:rgba(240,192,64,.25)}
  #mapPage .slot.partial .slot-count{color:var(--map-warn)}
  #mapPage .slot.full{background:rgba(62,207,142,.08);border-color:rgba(62,207,142,.25)}
  #mapPage .slot.full .slot-count{color:var(--map-ok)}
  #mapPage .slot.overflow{background:rgba(255,94,94,.10);border-color:rgba(255,94,94,.35)}
  #mapPage .slot.overflow .slot-count{color:var(--map-danger)}
  #mapPage .slot.picking-ok{background:rgba(123,156,255,.08);border-color:rgba(123,156,255,.25)}
  #mapPage .slot.picking-ok .slot-count{color:var(--map-picking)}
  #mapPage .slot.picking-over{background:rgba(123,156,255,.12);border-color:rgba(123,156,255,.40)}
  #mapPage .slot.picking-over .slot-count{color:#afc4ff}
  #mapPage .slot.no-cap{background:var(--map-empty);border-color:rgba(255,255,255,.04);opacity:.55}
  #mapPage .type-badge-completa{background:rgba(62,207,142,.15);color:var(--map-ok)}
  #mapPage .type-badge-picking{background:rgba(123,156,255,.15);color:var(--map-picking)}
  #mapPage .tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1e2026;border:1px solid var(--map-border);border-radius:10px;padding:10px 13px;min-width:210px;max-width:320px;z-index:100;font-size:12px;line-height:1.6;box-shadow:0 8px 30px rgba(0,0,0,.5);white-space:normal;text-align:left}
  #mapPage .slot:hover .tooltip{display:block}
  #mapPage .tooltip strong{color:var(--map-text)}
  #mapPage .tt-row{display:flex;justify-content:space-between;gap:16px}
  #mapPage .tt-ok{color:var(--map-ok)} #mapPage .tt-warn{color:var(--map-warn)} #mapPage .tt-danger{color:var(--map-danger)} #mapPage .tt-pick{color:var(--map-picking)}
  #mapPage .map-load{text-align:center;padding:34px;color:var(--map-muted);font-size:14px}
  body.map-tab-active #appShell > header{background:#f6f7fb !important;backdrop-filter:none !important;z-index:10000 !important}
  body.map-modal-open{overflow:hidden}
  body.map-modal-open #appShell > header{z-index:10000 !important}
  @media(max-width:820px){
    #mapPage{border-radius:16px;padding:10px}
    #mapPage .map-head{align-items:flex-start}
    #mapPage .map-btn{min-height:44px}
    #mapPage .wh-map{min-width:720px}
    #mapPage .slot{min-height:78px}
  }



  /* ===== Correção de legibilidade do cabeçalho do Mapa =====
     O CSS global do sistema aplica estilos a todos os <header> e deixava
     a barra do mapa clara, com texto/botões pouco legíveis. */
  #mapPage > header.map-head{
    position:static !important;
    top:auto !important;
    z-index:auto !important;
    background:var(--map-surface) !important;
    color:var(--map-text) !important;
    border:1px solid var(--map-border) !important;
    border-radius:14px !important;
    padding:12px !important;
    margin:0 0 14px !important;
    backdrop-filter:none !important;
    box-shadow:none !important;
  }
  #mapPage > header.map-head .map-brand{
    color:var(--map-text) !important;
  }
  #mapPage > header.map-head .map-brand span{
    color:var(--map-accent) !important;
  }
  #mapPage > header.map-head .map-btn{
    background:rgba(255,255,255,.09) !important;
    color:var(--map-text) !important;
    border-color:var(--map-border) !important;
    text-shadow:none !important;
  }
  #mapPage > header.map-head .map-btn:hover:not(:disabled){
    background:rgba(255,255,255,.14) !important;
    filter:none !important;
  }
  #mapPage > header.map-head .map-btn:disabled{
    opacity:1 !important;
    cursor:not-allowed !important;
    color:#aab2c5 !important;
    background:rgba(255,255,255,.035) !important;
    border-color:rgba(255,255,255,.07) !important;
  }
  #mapPage > header.map-head .map-pill{
    color:var(--map-ok) !important;
    background:rgba(62,207,142,.12) !important;
    border-color:rgba(62,207,142,.35) !important;
  }

</style>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
<div id="loginScreen">
  <div id="loginCard">
    <h2>Sign in</h2>
    <div class="hint">Precisas de autenticação para usar o sistema.</div>

    <div class="row">
      <div class="field" style="flex:1;min-width:220px">
        <label>Email</label>
        <input id="loginEmail" placeholder="email@empresa.com" autocomplete="username" />
      </div>
      <div class="field" style="flex:1;min-width:220px">
        <label>Password</label>
        <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <div class="row" style="margin-top:10px;justify-content:space-between;align-items:center">
      <button class="btn ok" id="btnLogin">Entrar</button>
      <div id="authMsg" style="flex:1;min-width:240px;margin-left:10px"></div>
    </div>

    <div class="hint" style="margin-top:12px">
      Perfis: <b>@admin.com</b> (Admin+Operação) • <b>@wh.com</b> (Operação+Consulta).<br>
      ⚠️ Abre sempre em <b>HTTPS</b> (Firebase Hosting) ou em <code>http://localhost</code>.
    </div>
  </div>
</div>

<div id="appShell">
<header>
  <div class="wrap">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h1>Warehouse — Operations & Control</h1>
      <div class="row" id="userCorner">
        <span class="pill" id="authPill">Auth: —</span>
        <button class="btn danger" id="btnLogout">Logout</button>
        <button class="btn ghost" id="btnReload">Recarregar</button>
      </div>
    </div>

    <div class="row" style="margin-top:10px;justify-content:space-between">
      <div class="tabs" id="tabs"></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="view"></div>
</div>
</div>

<script type="module">
  // ===== Debug Overlay (evita ecrã branco) =====
  function showFatal(err){
    try{
      console.error(err);
      const msg = (err && (err.message||err.reason||err))+"";
      const box = document.getElementById("authMsg") || document.getElementById("view") || document.body;
      if(box){
        const div = document.createElement("div");
        div.className = "msg err";
        div.style.marginTop = "12px";
        div.innerHTML = "Erro: " + (msg.replace(/[&<>]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;"}[c])));
        box.prepend(div);
      }
      const ls = document.getElementById("loginScreen");
      const as = document.getElementById("appShell");
      if(ls) ls.style.display = "flex";
      if(as) as.style.display = "none";
    }catch(e){}
  }
  window.addEventListener("error", (e)=>showFatal(e.error||e.message||e));
  window.addEventListener("unhandledrejection", (e)=>showFatal(e.reason||e));

  function normalizeBarcode(s){
    // Remove all whitespace, control characters and common scanner terminators (\r \n \t)
    return (s ?? "").toString().replace(/[\x00-\x1F\x7F\s]+/g, " ").trim().replace(/\s/g, "");

  // Debounce helper for scanner inputs: waits 150ms after last keystroke before firing.
  // Scanners send all chars at once but some mobile keyboards fire change/blur mid-stream.
  function makeScannerDebounce(fn, delay){
    delay = delay || 150;
    var t = null;
    return function(){ clearTimeout(t); var self=this, args=arguments; t = setTimeout(function(){ fn.apply(self, args); }, delay); };
  }

  function encodeKey(str){
    const u8 = new TextEncoder().encode(str);
    let bin = "";
    u8.forEach(b => bin += String.fromCharCode(b));
    const b64 = btoa(bin);
    return b64.replace(/=+$/,"").replace(/\+/g,"-").replace(/\//g,"_");
  }

  function cacheProductGroupsFromRows(rows){
    const map = new Map();

      ent.productIds.add(p.id);

  async function getProductByBarcode(barcode){
    const b = normalizeBarcode(barcode);
    if(!b) return null;
    if(__productByBarcodePromiseCache.has(b)) return __productByBarcodePromiseCache.get(b);

    const task = (async ()=>{
      const bKey = encodeKey(b);

      // 1) Novo: map barcode -> produto canónico
      const mapSnap = await getDoc(doc(db, COL_PRODUCT_BARCODES, bKey));
      if(mapSnap.exists()){
        const pid = mapSnap.data().productId;

        if(Array.isArray(state.cache.productsRaw) && state.cache.productsRaw.length){
          const found = state.cache.productsRaw.find(p=>p.id===pid);
          if(found) return found;
        }
        if(__productsMapPromise){
          try{
            const prodMap = await __productsMapPromise;
            if(prodMap.has(pid)) return prodMap.get(pid);
          }catch(_e){}
        }

        const pSnap = await getDoc(doc(db, COL_PRODUCTS, pid));
        return pSnap.exists() ? ({ id: pid, ...pSnap.data() }) : null;
      }

      // 2) Legacy: products/{barcodeKey}
      const legacySnap = await getDoc(doc(db, COL_PRODUCTS, bKey));
      if(!legacySnap.exists()) return null;

      const legacy = ({ id: legacySnap.id, ...legacySnap.data() });
      const name = legacy.name || "";
      const pid = productIdFromName(name) || legacy.id;

      // Migração "lazy": criar produto canónico + mapping (sem apagar legacy)
      if(pid && pid !== legacy.id){
        await setDoc(doc(db, COL_PRODUCTS, pid), {
          name: String(name||"").trim(),
          nameKey: normalizeProductName(name),
          barcodes: arrayUnion(b),
          updatedAt: serverTimestamp()
        }, { merge:true });

        await setDoc(doc(db, COL_PRODUCT_BARCODES, bKey), {
          barcode: b,
          productId: pid,
          name: String(name||"").trim(),
          updatedAt: serverTimestamp()
        }, { merge:true });

        invalidateCatalogCaches({ products:true, positions:false });
        const pSnap = await getDoc(doc(db, COL_PRODUCTS, pid));
        return pSnap.exists() ? ({ id: pid, ...pSnap.data() }) : legacy;
      }

      return legacy;
    })().catch(err=>{
      __productByBarcodePromiseCache.delete(b);
      throw err;
    });

    __productByBarcodePromiseCache.set(b, task);
    return task;
  }

  async function getPositionByBarcode(barcode){
    const b = normalizeBarcode(barcode);
    if(!b) return null;
    const cached = getCachedPositionLookup(b);

      cachePositionMiss(b);
      return null;
    })().catch(err=>{
      __positionInputPromiseCache.delete("b:" + b);
      throw err;
    });

    __positionInputPromiseCache.set("b:" + b, task);
    return task;
  }

  async function getPositionByInput(input){
    const raw = String(input||"").trim();
    if(!raw) return null;

    const cached = getCachedPositionLookup(raw);
    if(cached) return cached;

    const task = (async ()=>{
      // 0) Local/admin caches first
      if(Array.isArray(state.cache.positions) && state.cache.positions.length){
        const b = normalizeBarcode(raw);
        const upper = raw.toUpperCase();
        const found = state.cache.positions.find(p=>normalizeBarcode(p.barcode)===b || String(p.code||"").trim()===raw || String(p.code||"").trim().toUpperCase()===upper) || null;
        if(found) return cachePositionRecord(found);
      }

      // 1) Try as barcode (document id = encoded barcode)
      const b = normalizeBarcode(raw) || raw;
      try{
        const snap = await getDoc(doc(db, COL_POSITIONS, encodeKey(b)));
        if(snap.exists()) return cachePositionRecord({ id: snap.id, ...snap.data() });
      }catch(_e){}

      // 2) Try as location code (field: code) - exact and uppercase
      const code1 = raw;
      const code2 = raw.toUpperCase();
      for(const code of [code1, code2]){
        const q = query(collection(db, COL_POSITIONS), where("code","==",code), limit(1));
        const qs = await getDocs(q);
        if(!qs.empty){
          const d = qs.docs[0];
          return cachePositionRecord({ id: d.id, ...d.data() });
        }
      }

      cachePositionMiss(raw);
      return null;
    })().catch(err=>{
      __positionInputPromiseCache.delete("b:" + normalizeBarcode(raw));
      __positionInputPromiseCache.delete("c:" + raw);
      __positionInputPromiseCache.delete("c:" + raw.toUpperCase());
      throw err;
    });

    __positionInputPromiseCache.set("b:" + normalizeBarcode(raw), task);
    __positionInputPromiseCache.set("c:" + raw, task);
    __positionInputPromiseCache.set("c:" + raw.toUpperCase(), task);
    return task;
  }

  function mergeProductsForAdmin(rows){
    const buckets = new Map();

    rows.forEach(p=>{
      const key = normalizeProductName(p?.name || p?.id || "");
      if(!key) return;
      if(!buckets.has(key)){
        buckets.set(key, {
          key,
          id: productIdFromName(p?.name || "") || p.id,
          name: String(p?.name || "").trim(),
          nameKey: key,
          sourceIds: [],
          barcodes: new Set()
        });
      }
      const t = buckets.get(key);
      t.sourceIds.push(p.id);
      if(productIdFromName(p?.name || "") === p.id) t.id = p.id;
      if(!t.name && p?.name) t.name = String(p.name).trim();
      getProductBarcodes(p).forEach(b=>t.barcodes.add(b));
    });

    return Array.from(buckets.values()).map(x=>({
      ...x,
      barcodes: Array.from(x.barcodes)
    })).sort((a,b)=>(a.name||"").localeCompare(b.name||"", "pt", {sensitivity:"base"}));
  }

  function parseCSV(text){
    const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(l=>l.trim().length>0);
    if(lines.length===0) return [];
    const hdr = lines[0];
    const delim = (hdr.split(";").length > hdr.split(",").length) ? ";" : ",";
    return lines.map(line => parseCSVLine(line, delim));
  }
  function parseCSVLine(line, delim){
    const out = []; let cur=""; let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch === '"'){
        if(inQ && line[i+1] === '"'){ cur += '"'; i++; }
        else inQ = !inQ;
      }else if(ch === delim && !inQ){
        out.push(cur); cur="";
      }else cur += ch;
    }
    out.push(cur);
    return out;
  }

  async function getPositionCapacityInfo(positionId){
    if(!positionId) return { capacity:0, code:positionId || "" };
    try{
      const cached = __positionByIdCache && __positionByIdCache.get(positionId);
      const data = cached || (await loadPositionById(positionId));
      const cap = Number(data && data.capacity);
      return {
        capacity: Number.isFinite(cap) && cap >= 0 ? cap : 0,
        code: (data && data.code) ? String(data.code) : positionId,
        zone: (data && data.zone) ? String(data.zone) : ""
      };
    }catch(_e){
      return { capacity:0, code:positionId || "" };
    }
  }

  async function currentPalletsAtPosition(positionId, excludeDocIds){
    if(!positionId) return 0;
    const exclude = new Set((excludeDocIds || []).filter(Boolean));
    const snap = await getDocs(query(collection(db, COL_STOCK), where("positionId", "==", positionId)));
    let total = 0;
    snap.docs.forEach(d=>{
      if(exclude.has(d.id)) return;
      const s = d.data();
      const p = Number(s.qtyPallets || 0);
      const u = Number(s.qtyUnits || 0);
      total += (p > 0 ? p : (u > 0 ? 1 : 0));
    });
    return total;
  }

  async function confirmCapacityBeforeAdding(positionId, incomingPallets, slotType, context, excludeDocIds){
    const qty = Number(incomingPallets || 0);
    if(!(qty > 0)) return true;
    const t = String(slotType || "").toUpperCase();
    if(t === "PICKING") return true;
    try{
      const info = await getPositionCapacityInfo(positionId);
      const cap = Number(info.capacity || 0);
      if(!(cap > 0)) return true;
      const current = await currentPalletsAtPosition(positionId, excludeDocIds);
      const next = current + qty;
      if(next <= cap) return true;
      // ⚠️ Aviso informativo — operação SEMPRE permitida mesmo excedendo a cota
      window.__lastCapacityWarning = `⚠️ AVISO: A posição ${info.code || positionId} ficará em sobrecarga.\nCapacidade: ${cap} | Atual: ${current} | A adicionar: ${qty} | Total após: ${next}`;
      return true; // sempre permitir — nunca bloquear
    }catch(_e){
      return true;
    }
  }

  // ===== Stock ops =====
  async function addStock(positionId, productId, palletBarcode, slotType, deltaUnits, deltaPallets, origin, skipDupCheck){
    const user = auth.currentUser;
    if(!user) throw new Error("Not signed in.");
    if(!canOperate(user)) throw new Error("No permission.");
    const palletId = palletIdFromBarcode(palletBarcode);
    const key = stockKey(positionId, productId, palletId);
    const ref = doc(db, COL_STOCK, key);
    const pbc = normalizeBarcode(palletBarcode);

    const dU = Number(deltaUnits || 0);
    const dP = Number(deltaPallets || 0);

    // PICKING fica sempre com 1 UND (guarda palete e ignora quantidades inseridas)
    const pickingFixedOne = (String(slotType||"").toUpperCase()==="PICKING"); // PICKING_FIXED_ONE

    const org = (origin||"").toString().trim().toUpperCase();

    // ===== Verificar duplicado de palete =====
    // Só verificar em Put Away (inserção nova). No Adjust (skipDupCheck=true) a palete já existe
    // e o check causava falsos positivos quando o palletBarcode tem caracteres especiais (apóstrofos, etc.)
    if(pbc && !skipDupCheck){
      const dupQuery = query(
        collection(db, COL_STOCK),
        where("palletBarcode", "==", pbc)
      );
      const dupSnap = await getDocs(dupQuery);
      // Excluir o próprio documento (key) E documentos com positionId+productId iguais (mesmo slot)
      const conflicting = dupSnap.docs.filter(d => {
        if(d.id === key) return false;
        const dd = d.data();
        if(dd.positionId === positionId && dd.productId === productId) return false;
        return true;
      });
      if(conflicting.length > 0){
        const c = conflicting[0].data();
        const conflictPos = c.positionId || "?";
        throw new Error(`A palete "${pbc}" já existe no stock (posição: ${conflictPos}). Cada palete só pode estar registada uma vez.`);
      }
    }
    // =========================================

    if(dP > 0){
      window.__lastCapacityWarning = null;
      await confirmCapacityBeforeAdding(positionId, dP, slotType || "PICKING", "ARRUMAR");
      // operação continua sempre, mesmo em sobrecarga
    }

    await runTransaction(db, async (tx)=>{
      const snap = await tx.get(ref);
      const curU = snap.exists() ? Number(snap.data().qtyUnits || 0) : 0;
      const curP = snap.exists() ? Number(snap.data().qtyPallets || 0) : 0;

      let nextU = curU + dU;
      let nextP = curP + dP;
      if(pickingFixedOne){
        nextU = 1;
        nextP = curP + dP;
        if(nextP < 0) throw new Error("Stock insuficiente (PAL).");
      }

      if(!pickingFixedOne){
        if(nextU < 0) throw new Error("Stock insuficiente (UND).");
        if(nextP < 0) throw new Error("Stock insuficiente (Pallets).");
      }

      if(nextU === 0 && nextP === 0 && !pickingFixedOne){
        tx.delete(ref);
      }else{
        tx.set(ref, {
          positionId, productId,
          palletBarcode: pbc || "",
          slotType: slotType || "PICKING",
          qtyUnits: nextU,
          qtyPallets: nextP,
          origin: (org==="NEW"||org==="RETURNS") ? org : (snap.exists() ? (snap.data().origin||"") : ""),
          updatedAt: serverTimestamp()
        }, { merge:true });
      }

      const mvRef = doc(collection(db, COL_MOVEMENTS));
      tx.set(mvRef, {
        type: (dP < 0 && dU === 0) ? "REMOVER" : ((dU > 0 || dP > 0) ? "ARRUMAR" : "RETIRAR"),
        ts: serverTimestamp(),
        userId: user.uid,
        userEmail: (user.email||""),
        userLabel: ((user.email||"").split("@")[0]||""),
        positionId,
        productId,
        palletBarcode: pbc || "",
        slotType: slotType || "PICKING",
        qtyUnits: Math.abs(dU),
        qtyPallets: Math.abs(dP),
        qtyUnitsRequested: Math.abs(dU),
        qtyPalletsRequested: Math.abs(dP),
        qtyUnitsApplied: pickingFixedOne ? 1 : Math.abs(dU),
        qtyPalletsApplied: Math.abs(dP),
        pickingIgnoredUnits: pickingFixedOne,
        pickingFixed: pickingFixedOne,
        origin: ((dU>=0 || dP>=0) && (org==="NEW"||org==="RETURNS")) ? org : "",
      });
    });
    invalidateDerivedCaches();
  }

  async function ensurePickingPallet(positionId, productId, palletBarcode){
    const palletId = palletIdFromBarcode(palletBarcode);
    const key = stockKey(positionId, productId, palletId);
    const ref = doc(db, COL_STOCK, key);
    const pbc = normalizeBarcode(palletBarcode);

    // Verificar duplicado de palete
    if(pbc){
      const dupQuery = query(
        collection(db, COL_STOCK),
        where("palletBarcode", "==", pbc)
      );
      const dupSnap = await getDocs(dupQuery);
      const conflicting = dupSnap.docs.filter(d => d.id !== key);
      if(conflicting.length > 0){
        const c = conflicting[0].data();
        throw new Error(`A palete "${pbc}" já existe no stock (posição: ${c.positionId || "?"}). Cada palete só pode estar registada uma vez.`);
      }
    }

    await setDoc(ref, {
      positionId, productId,
      palletBarcode: pbc || "",
      slotType: "PICKING",
      qtyUnits: 1,
      updatedAt: serverTimestamp()
    }, { merge:true });
    invalidateDerivedCaches();
  }

  async function transferReplenish(fromPositionId, toPositionId, productId, srcPallet, dstPallet, qtyUnits, qtyPallets){
    const user = auth.currentUser;
    if(!user) throw new Error("Not signed in.");
    if(!canOperate(user)) throw new Error("No permission.");

    const srcPbc = normalizeBarcode(srcPallet);
    let dstPbc = normalizeBarcode(dstPallet);
    if(!srcPbc) throw new Error("Falta palete de origem.");
    // Destino (PICKING): se não indicar palete, cria uma palete virtual por produto
    if(!dstPbc) dstPbc = "PICK-"+String(productId||"").slice(0,20);

    const srcPid = palletIdFromBarcode(srcPbc);
    const srcKey = stockKey(fromPositionId, productId, srcPid);
    const srcRef = doc(db, COL_STOCK, srcKey);

    // destino PICKING (palete virtual)
    const dstPid = palletIdFromBarcode(dstPbc);
    const dstKey = stockKey(toPositionId, productId, dstPid);
    const dstRef = doc(db, COL_STOCK, dstKey);

    const qU = Math.floor(Number(qtyUnits||0));
    const qP = Math.floor(Number(qtyPallets||0));
    if(!(qU>0 || qP>0)) throw new Error("Falta quantidade.");

    await runTransaction(db, async (tx)=>{
      // ✅ Firestore: todas as leituras ANTES de quaisquer escritas
      const [snap, dstSnap] = await Promise.all([tx.get(srcRef), tx.get(dstRef)]);

      if(!snap.exists()) throw new Error("Pallet de origem não existe no stock.");
      const curU = Number(snap.data().qtyUnits||0);
      const curP = Number(snap.data().qtyPallets||0);

      const nextU = curU - qU;
      const nextP = curP - qP;
      if(nextU < 0) throw new Error("Stock insuficiente (UND).");
      if(nextP < 0) throw new Error("Stock insuficiente (Pallets).");

      // ler destino (já lido acima) e calcular paletes
      const curDstP = dstSnap.exists() ? Number(dstSnap.data().qtyPallets || 0) : 0;
      const nextDstP = curDstP + qP;
      if(nextDstP < 0) throw new Error("Stock insuficiente (PAL) no destino.");

      // === Escritas (depois das leituras) ===
      if(nextU===0 && nextP===0){
        tx.delete(srcRef);
      }else{
        tx.set(srcRef, { qtyUnits: nextU, qtyPallets: nextP, updatedAt: serverTimestamp() }, { merge:true });
      }

      // destino PICKING: manter sempre 1 UND
      tx.set(dstRef, {
        positionId: toPositionId, productId,
        palletBarcode: dstPbc,
        slotType: "PICKING",
        qtyUnits: 1,
        qtyPallets: nextDstP,
        updatedAt: serverTimestamp()
      }, { merge:true });

      const mvRef = doc(collection(db, COL_MOVEMENTS));
      tx.set(mvRef, {
        type: "REABASTECER",
        ts: serverTimestamp(),
        userId: user.uid,
        userEmail: (user.email||""),
        userLabel: ((user.email||"").split("@")[0]||""),
        fromPositionId,
        toPositionId,
        productId,
        palletBarcode: srcPbc,
        destPalletBarcode: dstPbc,
        qtyUnits: qU,
        qtyPallets: qP,
        destSlotType: "PICKING",
        destQtyUnitsFixed: 1,
        destQtyPalletsAfter: nextDstP,
        pickingIgnoredUnits: true,
      });
    });
    invalidateDerivedCaches();
  }


  async function moveStock(fromPositionId, toPositionId, productId, palletBarcode, units, pallets, newStatus){
    const user = auth.currentUser;
    if(!user) throw new Error("Not signed in.");
    if(!canOperate(user)) throw new Error("No permission.");
    if(fromPositionId === toPositionId) throw new Error("Origin = Destino.");

    const palletId = palletIdFromBarcode(palletBarcode);
    const pbc = normalizeBarcode(palletBarcode);

    const u = Number(units || 0);
    const p = Number(pallets || 0);
    if(u <= 0 && p <= 0) throw new Error("Indica UND e/ou Pallets.");

    const fromRef = doc(db, COL_STOCK, stockKey(fromPositionId, productId, palletId));
    const toRef   = doc(db, COL_STOCK, stockKey(toPositionId, productId, palletId));

    // Verificar conflito: a palete não pode existir noutro registo que não seja a própria origem ou destino.
    // (a origem é a palete que estamos a mover — é esperado que exista; o destino é onde vai ficar)
    if(pbc){
      const dupQuery = query(collection(db, COL_STOCK), where("palletBarcode", "==", pbc));
      const dupSnap = await getDocs(dupQuery);
      const toKey   = stockKey(toPositionId,   productId, palletId);
      const fromKey = stockKey(fromPositionId,  productId, palletId);
      const conflicting = dupSnap.docs.filter(d => d.id !== toKey && d.id !== fromKey);
      if(conflicting.length > 0){
        const c = conflicting[0].data();
        throw new Error(`A palete "${pbc}" já existe noutro registo distinto (posição: ${c.positionId || "?"}). Resolve o conflito antes de mover.`);
      }
    }

    if(p > 0){
      try{
        const fromCheck = await getDoc(fromRef);
        const fromTypeCheck = fromCheck.exists() ? (fromCheck.data().slotType || "PICKING") : "PICKING";
        window.__lastCapacityWarning = null;
        await confirmCapacityBeforeAdding(toPositionId, p, fromTypeCheck, "MUDAR", [fromRef.id]);
        // operação continua sempre, mesmo em sobrecarga
      }catch(_capErr){ /* ignorar erros de capacidade */ }
    }

    await runTransaction(db, async (tx)=>{
      const fromSnap = await tx.get(fromRef);
      const fromU = fromSnap.exists() ? Number(fromSnap.data().qtyUnits||0) : 0;
      const fromP = fromSnap.exists() ? Number(fromSnap.data().qtyPallets||0) : 0;
      if(fromU < u) throw new Error("Stock insuficiente (UND) na origem.");
      if(fromP < p) throw new Error("Stock insuficiente (Pallets) na origem.");
      const fromType = fromSnap.exists() ? (fromSnap.data().slotType || "PICKING") : "PICKING";
      const fromStatus = fromSnap.exists() ? (fromSnap.data().status || "") : "";
      const statusToSet = (typeof newStatus === "string" && newStatus.trim() !== "") ? newStatus.trim() : fromStatus;
      

      const toSnap = await tx.get(toRef);
      const toU = toSnap.exists() ? Number(toSnap.data().qtyUnits||0) : 0;
      const toP = toSnap.exists() ? Number(toSnap.data().qtyPallets||0) : 0;
      const toType = toSnap.exists() ? (toSnap.data().slotType || fromType) : fromType;

      const nextFromU = fromU - u;
      const nextFromP = fromP - p;
      const nextToU = toU + u;
      const nextToP = toP + p;

      if(nextFromU === 0 && nextFromP === 0) tx.delete(fromRef);
      else tx.set(fromRef, { qtyUnits: nextFromU, qtyPallets: nextFromP, updatedAt: serverTimestamp() }, { merge:true });

      tx.set(toRef, {
        positionId: toPositionId,
        productId,
        palletBarcode: pbc || "",
        slotType: toType,
        status: statusToSet,
        qtyUnits: nextToU,
        qtyPallets: nextToP,
        updatedAt: serverTimestamp()
      }, { merge:true });

      const mvRef = doc(collection(db, COL_MOVEMENTS));
      tx.set(mvRef, {
        type: "MUDAR",
        ts: serverTimestamp(),
        userId: user.uid,
        userEmail: (user.email||""),
        userLabel: ((user.email||"").split("@")[0]||""),
        fromPositionId,
        toPositionId,
        productId,
        palletBarcode: pbc || "",
        qtyUnits: u,
        qtyPallets: p,
        status: statusToSet
      });
    });
    invalidateDerivedCaches();
  }

  async function moveAllFromPosition(fromPositionId, toPositionId){
    const user = auth.currentUser;
    if(!user) throw new Error("Not signed in.");
    if(!canOperate(user)) throw new Error("No permission.");
    if(fromPositionId === toPositionId) throw new Error("Origin = Destino.");

    // "Mover tudo": para todos os stockItems daquela posição (inclui paletes)
    const qy = query(collection(db, COL_STOCK), where("positionId","==", fromPositionId));
    const snap = await getDocs(qy);
    if(snap.empty) throw new Error("Origin sem stock.");

    const totalMovePallets = snap.docs.reduce((acc,d)=>{
      const s = d.data();
      const p = Number(s.qtyPallets || 0);
      const u = Number(s.qtyUnits || 0);
      return acc + (p > 0 ? p : (u > 0 ? 1 : 0));
    }, 0);
    const hasOnlyPickingMove = snap.docs.every(d=>String((d.data().slotType || "PICKING")).toUpperCase()==="PICKING");
    if(totalMovePallets > 0 && !hasOnlyPickingMove){
      window.__lastCapacityWarning = null;
      await confirmCapacityBeforeAdding(toPositionId, totalMovePallets, "COMPLETA", "MUDAR TUDO", snap.docs.map(d=>d.id));
      // operação continua sempre, mesmo em sobrecarga
    }

    // Nota: batch com leituras para somar destino (simples)
    const batch = writeBatch(db);
    for(const d of snap.docs){
      const data = d.data();
      const prodId = data.productId;
      const qtyU = Number(data.qtyUnits||0);
      const qtyP = Number(data.qtyPallets||0);
      const pbc = normalizeBarcode(data.palletBarcode || "");
      const palId = palletIdFromBarcode(pbc);

      // Verificar conflito: a palete não pode existir noutro registo que não seja
      // ela própria (origem) ou o destino calculado.
      if(pbc){
        const toKeyCheck   = stockKey(toPositionId,   prodId, palId);
        const fromKeyCheck = d.id; // é o próprio registo de origem
        const dup = await getDocs(query(collection(db, COL_STOCK), where("palletBarcode","==",pbc)));
        const conflicts = dup.docs.filter(x => x.id !== toKeyCheck && x.id !== fromKeyCheck);
        if(conflicts.length > 0){
          const cp = conflicts[0].data();
          throw new Error(`A palete "${pbc}" já existe noutro registo distinto (posição: ${cp.positionId||"?"}). Resolve o conflito antes de usar "Mover Tudo".`);
        }
      }

      if(qtyU<=0 && qtyP<=0) continue;

      const toDocRef = doc(db, COL_STOCK, stockKey(toPositionId, prodId, palId));
      const toSnap = await getDoc(toDocRef);
      const toU = toSnap.exists() ? Number(toSnap.data().qtyUnits||0) : 0;
      const toP = toSnap.exists() ? Number(toSnap.data().qtyPallets||0) : 0;
      const slotType = toSnap.exists() ? (toSnap.data().slotType || data.slotType || "PICKING") : (data.slotType || "PICKING");

      batch.set(toDocRef, {
        positionId: toPositionId,
        productId: prodId,
        palletBarcode: pbc || "",
        slotType,
        qtyUnits: toU + qtyU,
        qtyPallets: toP + qtyP,
        updatedAt: serverTimestamp()
      }, { merge:true });

      batch.delete(d.ref);
    }

    const mvRef = doc(collection(db, COL_MOVEMENTS));
    batch.set(mvRef, {
      type:"MUDAR_TUDO",
      ts:serverTimestamp(),
      userId:user.uid,
      userEmail:(user.email||""),
      userLabel:((user.email||"").split("@")[0]||""),
      fromPositionId,
      toPositionId,
      palletCount: snap.docs.length
    });

    // Registo individual por palete (permite rastrear cada uma)
    for(const d of snap.docs){
      const data = d.data();
      const qtyU = Number(data.qtyUnits||0);
      const qtyP = Number(data.qtyPallets||0);
      if(qtyU<=0 && qtyP<=0) continue;
      const mvPalRef = doc(collection(db, COL_MOVEMENTS));
      batch.set(mvPalRef, {
        type:"MUDAR",
        ts:serverTimestamp(),
        userId:user.uid,
        userEmail:(user.email||""),
        userLabel:((user.email||"").split("@")[0]||""),
        fromPositionId,
        toPositionId,
        productId: data.productId || "",
        palletBarcode: normalizeBarcode(data.palletBarcode||""),
        qtyUnits: qtyU,
        qtyPallets: qtyP,
        partOfMudarTudo: true
      });
    }

    await batch.commit();
    invalidateDerivedCaches();
  }

    $("pCsv").onchange = async (e)=>{
      const f = e.target.files && e.target.files[0];
      if(!f) return;
      try{
        const rows = parseCSV(await f.text());
        if(rows.length<=1) throw new Error("CSV sem dados.");
        const imported = rows.slice(1).filter(r=>r.length>=2)
          .map(r=>({name:(r[0]||"").trim(), barcode:normalizeBarcode(r[1])}))
          .filter(x=>x.name && x.barcode);

        const batch = writeBatch(db);
        imported.forEach(item=>{
          const pid = productIdFromName(item.name);
          // produto canónico por nome
          batch.set(doc(db, COL_PRODUCTS, pid), {
            name: item.name,
            nameKey: normalizeProductName(item.name),
            barcodes: arrayUnion(item.barcode),
            updatedAt: serverTimestamp()
          }, {merge:true});
          // mapping barcode -> produto
          batch.set(doc(db, COL_PRODUCT_BARCODES, encodeKey(item.barcode)), {
            barcode: item.barcode,
            productId: pid,
            name: item.name,
            updatedAt: serverTimestamp()
          }, {merge:true});
        });
        await batch.commit();
        $("pMsg").innerHTML = msgBox(`✅ Importados/atualizados <b>${imported.length}</b> produtos.`, "ok");
        await loadAdminLists(); renderProductsTable();
      }catch(err){ $("pMsg").innerHTML = msgBox("Erro: "+esc(err.message), "err"); }

    };

      }catch(err){ $("pMsg").innerHTML = msgBox("Erro: "+esc(err.message), "err"); }

        $("pMsg").innerHTML = msgBox("✅ Products exportados.", "ok");
      }catch(err){
        $("pMsg").innerHTML = msgBox("Erro: "+esc(err.message), "err");
      }
    };
$("pSearch").oninput = renderProductsTable;

    $("sCsv").onchange = async (e)=>{
      const f = e.target.files && e.target.files[0];
      if(!f) return;
      try{
        const rows = parseCSV(await f.text());
        if(rows.length<=1) throw new Error("CSV sem dados.");
        const parsedLocations = rows.slice(1).filter(r=>r.length>=2)
          .map(r=>({code:String(r[0]||"").trim().toUpperCase(), barcode:normalizeBarcode(r[1])}))
          .filter(x=>x.code && x.barcode);
        const skippedBadLocations = parsedLocations.filter(x=>isBadLocationCode(x.code));
        const imported = parsedLocations.filter(x=>!isBadLocationCode(x.code));

        const batch = writeBatch(db);
        imported.forEach(item=>{
          batch.set(doc(db, COL_POSITIONS, encodeKey(item.barcode)), {code:item.code, barcode:item.barcode, updatedAt:serverTimestamp()}, {merge:true});
        });
        await batch.commit();
        const skippedMsg = skippedBadLocations.length ? ` • ignoradas <b>${skippedBadLocations.length}</b> locations CC/SKU` : "";
        $("locMsg").innerHTML = msgBox(`✅ Importadas/atualizadas <b>${imported.length}</b> posições${skippedMsg}.`, "ok");
        await loadAdminLists(); renderPositionsTable();

      try{
        await loadAdminLists();

        if(!bad.length){
          $("locMsg").innerHTML = msgBox('✅ Não encontrei locations "CC" nem começadas por "SKU".', "ok");
          renderPositionsTable();
          return;
        }
        if(!confirm(`Eliminar ${bad.length} location(s) com código "CC" ou começado por "SKU"?

Isto só apaga documentos da coleção Locations/positions.`)) return;
        const batch = writeBatch(db);
        bad.forEach(p=>batch.delete(doc(db, COL_POSITIONS, p.id)));
        await batch.commit();
        invalidateCatalogCaches({ products:false, positions:true });
        await loadAdminLists();

    function renderProductsTable(){
      const term = ($("pSearch").value||"").toLowerCase().trim();
      const list = state.cache.products.filter(p=>{
        const n = (p.name||"").toLowerCase();
        const bars = getProductBarcodes(p);
        const btxt = bars.map(x=>String(x||"").toLowerCase()).join(" ");
        return !term || n.includes(term) || btxt.includes(term);
      });

      $("pTable").innerHTML = list.map(p=>{
        const bars = getProductBarcodes(p);
        const bShow = bars.join(", ");
        const dupHint = (p.sourceIds && p.sourceIds.length>1)
          ? `<div class="hint" style="margin-top:4px">${p.sourceIds.length} registos antigos agrupados neste produto.</div>`
          : "";
        return `
        <tr>
          <td>
            <input value="${esc(p.name||"")}" data-id="${esc(p.id)}" class="pEditName" />
            ${dupHint}
          </td>
          <td><input value="${esc(bShow)}" data-id="${esc(p.id)}" class="pEditBarcode" placeholder="Adicionar barcode e guardar" /></td>
          <td class="right" style="white-space:nowrap">
            <button class="btn ghost pDel" data-id="${esc(p.id)}" data-dup="${(p.sourceIds||[]).length}">Apagar</button>
          </td>
        </tr>`;
      }).join("");

      document.querySelectorAll(".pEditName").forEach(inp=>{
        inp.onchange = async ()=>{
          try{
            const id = inp.dataset.id;
            const nm = String(inp.value||"").trim();
            if(!nm) return;
            await setDoc(doc(db, COL_PRODUCTS, id), { name:nm, nameKey: normalizeProductName(nm), updatedAt: serverTimestamp() }, {merge:true});
            await loadAdminLists(); renderProductsTable();
          }catch(err){ $("pMsg").innerHTML = msgBox("Erro: "+esc(err.message), "err"); }
        };
      });

      document.querySelectorAll(".pEditBarcode").forEach(inp=>{
        inp.onchange = async ()=>{
          try{
            const id = inp.dataset.id;
            const raw = String(inp.value||"");
            const parts = raw.split(",").map(x=>normalizeBarcode(x)).filter(Boolean);
            if(parts.length===0) return;
            const b = parts[parts.length-1];
            const prod = state.cache.products.find(p=>p.id===id);
            await setDoc(doc(db, COL_PRODUCTS, id), { barcodes: arrayUnion(b), updatedAt: serverTimestamp() }, {merge:true});
            await setDoc(doc(db, COL_PRODUCT_BARCODES, encodeKey(b)), { barcode:b, productId:id, name: prod?.name || "", updatedAt: serverTimestamp() }, {merge:true});
            await loadAdminLists(); renderProductsTable();
          }catch(err){ $("pMsg").innerHTML = msgBox("Erro: "+esc(err.message), "err"); }
        };
      });

      document.querySelectorAll(".pDel").forEach(btn=>{
        btn.onclick = async (ev)=>{
          ev.preventDefault(); ev.stopPropagation();
          try{
            const id = btn.dataset.id;
            const dup = Number(btn.dataset.dup||0);
            if(dup>1){
              $("pMsg").innerHTML = msgBox("Este produto tem registos antigos agrupados. Não apague daqui para não perder dados.", "warn");
              return;
            }
            if(!confirm("Apagar produto?")) return;
            await deleteDoc(doc(db, COL_PRODUCTS, id));
            await loadAdminLists(); renderProductsTable();
            $("pMsg").innerHTML = msgBox("✅ Apagado.", "ok");
          }catch(err){
            $("pMsg").innerHTML = msgBox("Erro: "+esc(err.message), "err");
          }
        };
      });
    }

    function renderPositionsTable(){
      const term = ($("sSearch").value||"").toLowerCase().trim();
      const list = state.cache.positions.filter(p=>{
        const c=(p.code||"").toLowerCase();
        const b=normalizeBarcode(p.barcode).toLowerCase();
        return !term || c.includes(term) || b.includes(term);
      });

      $("sTable").innerHTML = list.map(p=>`
        <tr>
          <td><input data-id="${p.id}" data-k="code" value="${esc(p.code||"")}" /></td>
          <td><input class="mono" data-id="${p.id}" data-k="barcode" value="${esc(p.barcode||"")}" /></td>
          <td style="white-space:nowrap">
            <button class="btn ghost" data-act="save" data-id="${p.id}">Guardar</button>
            <button class="btn danger" data-act="del" data-id="${p.id}">Apagar</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="3">Sem posições.</td></tr>`;

      $("sTable").querySelectorAll("button").forEach(btn=>{
        btn.onclick = async ()=>{
          const id = btn.dataset.id, act = btn.dataset.act;
          try{
            if(act==="del"){
              if(!confirm("Apagar posição?")) return;
              await deleteDoc(doc(db, COL_POSITIONS, id));
              await loadAdminLists(); renderPositionsTable();
              $("locMsg").innerHTML = msgBox("✅ Apagado.", "ok");
            }else{
              const code = $("sTable").querySelector(`input[data-id="${id}"][data-k="code"]`).value.trim();
              const barcode = normalizeBarcode($("sTable").querySelector(`input[data-id="${id}"][data-k="barcode"]`).value);
              if(!code || !barcode) throw new Error("Location e barcode obrigatórios.");
              const newId = encodeKey(barcode);
              await setDoc(doc(db, COL_POSITIONS, newId), {code, barcode, updatedAt:serverTimestamp()}, {merge:true});
              if(newId !== id) await deleteDoc(doc(db, COL_POSITIONS, id));
              await loadAdminLists(); renderPositionsTable();
              $("locMsg").innerHTML = msgBox("✅ Guardado.", "ok");
            }
          }catch(err){ $("locMsg").innerHTML = msgBox("Erro: "+esc(err.message), "err"); }
        };
      });
    }
  }
