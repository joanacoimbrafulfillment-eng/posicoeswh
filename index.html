  async function resolvePalletProduct(positionId, palletBarcode){
    const pbc = normalizeBarcode(palletBarcode);
    if(!positionId || !pbc) return { ok:false, reason:"sem_dados" };

    const qy = query(
      collection(db, COL_STOCK),
      where("positionId", "==", positionId),
      where("palletBarcode", "==", pbc)
    );
    const snap = await getDocs(qy);

    if(snap.empty) return { ok:false, reason:"nao_encontrado", pbc };
    if(snap.size > 1) return { ok:false, reason:"multiplo", pbc, count:snap.size };

    const s = snap.docs[0].data();
    const prodId = s.productId;
    let product = null;
    let canonicalId = prodId;

    let prodSnap = await getDoc(doc(db, COL_PRODUCTS, prodId));
    if(prodSnap.exists()){
      product = ({ id: prodId, ...prodSnap.data() });
    }else{
      const mapSnap = await getDoc(doc(db, COL_PRODUCT_BARCODES, prodId));
      if(mapSnap.exists()){
        canonicalId = mapSnap.data().productId;
        const p2 = await getDoc(doc(db, COL_PRODUCTS, canonicalId));
        if(p2.exists()) product = ({ id: canonicalId, ...p2.data(), legacyId: prodId });
      }
      if(!product) product = ({ id: prodId, name: prodId, barcodes:[] });
    }

    return { ok:true, pbc, productId:prodId, productCanonicalId: (product && product.id) ? product.id : prodId, product, stock:s };
  }

  async function resolvePalletGlobal(palletBarcode){
    const pbc = normalizeBarcode(palletBarcode);
    if(!pbc) return { ok:false, reason:"sem_dados" };

    const cached = __palletResolutionPromiseCache.get(pbc);
    if(cached){
      if(cached.promise) return cached.promise;
      if(cached.value && (Date.now() - cached.ts) < PALLET_RESOLUTION_TTL_MS) return cached.value;
      __palletResolutionPromiseCache.delete(pbc);
    }

    const task = (async ()=>{
      const qy = query(
        collection(db, COL_STOCK),
        where("palletBarcode", "==", pbc)
      );
      const snap = await getDocs(qy);

      if(snap.empty){
        // ── FALLBACK PARA PALETES ANTIGAS ──────────────────────────────────────
        // Paletes criadas antes desta versão podem ter o campo palletBarcode
        // vazio ou ausente no documento, mesmo que o ID do documento contenha
        // o palletId codificado (encodeKey(pbc)). A query acima não as encontra.
        // Fazemos um scan a todos os stockItems e filtramos pelo sufixo "__<palletId>"
        // no ID do documento — isto resolve todas as paletes legadas sem alterar
        // nenhuma outra funcionalidade.
        const palletIdEncoded = palletIdFromBarcode(pbc); // encodeKey(normalizeBarcode(pbc))
        const legacySuffix = "__" + palletIdEncoded;
        try {
          const allSnap = await getDocs(collection(db, COL_STOCK));
          const legacyDocs = allSnap.docs.filter(d => d.id.endsWith(legacySuffix));
          if(legacyDocs.length > 0){
            // Auto-reparar o campo palletBarcode nos docs antigos (fire-and-forget)
            // updateDoc já está no scope via named import no topo do ficheiro
            legacyDocs.forEach(d => {
              if(!d.data().palletBarcode){
                try {
                  updateDoc(d.ref, { palletBarcode: pbc }).catch(() => {});
                } catch(_e2) {}
              }
            });
            // Montar resultado com o mesmo pipeline do caminho normal
            const legacyData = legacyDocs.map(d => ({ id: d.id, ...d.data() }));
            const posIdsL  = [...new Set(legacyData.map(x => x.positionId).filter(Boolean))];
            const prodIdsL = [...new Set(legacyData.map(x => x.productId).filter(Boolean))];
            const positionsL   = await Promise.all(posIdsL.map(id => loadPositionById(id)));
            const posMapL      = new Map(posIdsL.map((id, i) => [id, positionsL[i] || { id, code: id }]));
            const prodInfoMapL = await resolveCanonicalProductsForIds(prodIdsL);
            const rowsL = legacyData.map(s => {
              const pos  = posMapL.get(s.positionId) || { id: s.positionId, code: s.positionId };
              const info = prodInfoMapL.get(s.productId) || { canonicalId: s.productId, name: s.productId, barcodes: [] };
              const primaryBarcode = Array.isArray(info.barcodes) && info.barcodes.length ? info.barcodes[0] : "";
              const prod = {
                id:      info.canonicalId || s.productId,
                name:    info.name        || s.productId,
                barcode: primaryBarcode,
                barcodes: info.barcodes  || []
              };
              return { stock: s, position: pos, product: prod, productCanonicalId: prod.id || s.productId };
            });
            const resultL = (rowsL.length > 1)
              ? { ok: false, reason: "multiplo", pbc, rows: rowsL }
              : { ok: true,  pbc, productCanonicalId: rowsL[0].productCanonicalId, ...rowsL[0] };
            __palletResolutionPromiseCache.set(pbc, { ts: Date.now(), value: resultL });
            return resultL;
          }
        } catch(fallbackErr) {
          console.warn("resolvePalletGlobal: fallback scan for legacy pallets failed:", fallbackErr);
        }
        // ── FIM FALLBACK ───────────────────────────────────────────────────────
        const result = { ok:false, reason:"nao_encontrado", pbc };
        __palletResolutionPromiseCache.set(pbc, { ts:Date.now(), value:result });
        return result;
      }

      // Map results with position/product info
      const docs = snap.docs.map(d=>({ id:d.id, ...d.data() }));
      const posIds = [...new Set(docs.map(x=>x.positionId).filter(Boolean))];
      const prodIds = [...new Set(docs.map(x=>x.productId).filter(Boolean))];

      const positions = await Promise.all(posIds.map(id=>loadPositionById(id)));
      const posMap = new Map(posIds.map((id,i)=>[id, positions[i] || ({id, code:id}) ]));
      const prodInfoMap = await resolveCanonicalProductsForIds(prodIds);

      const rows = docs.map(s=>{
        const pos = posMap.get(s.positionId) || {id:s.positionId, code:s.positionId};
        const info = prodInfoMap.get(s.productId) || { canonicalId:s.productId, name:s.productId, barcodes:[] };
        const primaryBarcode = Array.isArray(info.barcodes) && info.barcodes.length ? info.barcodes[0] : "";
        const prod = {
          id: info.canonicalId || s.productId,
          name: info.name || s.productId,
          barcode: primaryBarcode,
          barcodes: info.barcodes || []
        };
        return { stock:s, position:pos, product:prod, productCanonicalId: prod.id || s.productId };
      });

      const result = (rows.length > 1)
        ? { ok:false, reason:"multiplo", pbc, rows }
        : { ok:true, pbc, productCanonicalId: rows[0].productCanonicalId, ...rows[0] };

      __palletResolutionPromiseCache.set(pbc, { ts:Date.now(), value:result });
      return result;
    })().catch(err=>{
      __palletResolutionPromiseCache.delete(pbc);
      throw err;
    });

    __palletResolutionPromiseCache.set(pbc, { ts:Date.now(), promise:task });
    return task;
  }


  function setupRemove(){
      const opBack = document.getElementById("opBackBtn");
      if(opBack){ opBack.onclick = ()=>{ state.op="menu"; renderOperacao(); }; }
      const rPos=$("rPos"), rProd=$("rProd"), rPal=$("rPal"), rQtyU=$("rQtyU"), rQtyP=$("rQtyP");
      const rDo=$("rDo"), rClear2=$("rClear2");
      const rMsg=$("rMsg"), rPalInfo=$("rPalInfo");
      const rModeRemove=$("rModeRemove"), rModeAdd=$("rModeAdd"), rModeHint=$("rModeHint");
  
      let pos=null, prod=null, pal=null, stock=null;
      let mode=null; // "add" | "remove"
  
      function setMode(m){
        mode = m;
        if(m==="remove"){
          rModeRemove.style.outline = "3px solid var(--danger)";
          rModeAdd.style.outline = "";
          rModeHint.textContent = "Modo: RETIRAR — vai subtrair do stock.";
          rModeHint.style.color = "var(--danger)";
        }else{
          rModeAdd.style.outline = "3px solid var(--ok)";
          rModeRemove.style.outline = "";
          rModeHint.textContent = "Modo: ADICIONAR — vai somar ao stock.";
          rModeHint.style.color = "var(--ok)";
        }
        enable();
      }
  
      function reset(){
        pos=prod=pal=stock=null;
        mode=null;
        rPal.value=""; rPos.value=""; rProd.value="";
        rQtyU.value=""; rQtyP.value="";
        rQtyU.disabled=true; rQtyP.disabled=true;
        rDo.disabled=true;
        if(rPalInfo) rPalInfo.textContent="";
        if(rModeRemove){ rModeRemove.style.outline=""; rModeRemove.disabled=true; }
        if(rModeAdd){ rModeAdd.style.outline=""; rModeAdd.disabled=true; }
        if(rModeHint){ rModeHint.textContent="Seleciona o tipo de ajuste."; rModeHint.style.color=""; }
        var _rs=$("rStatus"); if(_rs){ _rs.disabled=true; _rs.innerHTML='<option value="" selected>(keep)</option>'; }
        rMsg.innerHTML = msgBox("Pica a PALETE para carregar origem/produto.", "warn");
        rPal.focus();
      }
      reset();
      if(rClear2) rClear2.onclick = reset;
      if(rModeRemove) rModeRemove.onclick = ()=>setMode("remove");
      if(rModeAdd) rModeAdd.onclick = ()=>setMode("add");
  
      function enable(){
        const u=Math.floor(Number(rQtyU.value||0));
        const p=Math.floor(Number(rQtyP.value||0));
        rDo.disabled = !(pos && prod && pal && mode && (u>0 || p>0));
      }
      rQtyU.addEventListener("input", enable);
      rQtyP.addEventListener("input", enable);
  
      function unlockAfterPallet(){
        rQtyU.disabled=false; rQtyP.disabled=false;
        if(rModeRemove) rModeRemove.disabled=false;
        if(rModeAdd) rModeAdd.disabled=false;
        var _rs=$("rStatus");
        if(_rs){
          _rs.disabled=false;
          ensureStatusesLoaded().then(list=>{
            const arr = (list && list.length) ? list : DEFAULT_STATUSES;
            _rs.innerHTML = '<option value="" selected>(keep)</option>' + arr.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");
          }).catch(()=>{});
        }
        rQtyU.focus();
      }
  
      function pickingWarning(){
        const slotType = String(stock.slotType||"").toUpperCase();
        if(slotType === "PICKING"){
          return `<div class="msg warn" style="margin-top:8px">⚠️ Esta palete é do tipo <b>PICKING</b> — adicionar UND não tem efeito (fica sempre em 1 UND). Só Pallets são somadas/subtraídas normalmente.</div>`;
        }
        return "";
      }
  
      async function resolvePal(){
        const code = normalizeBarcode(rPal.value);
        if(!code){ rMsg.innerHTML = msgBox("Pica a PALETE.", "warn"); return; }
        const res = await resolvePalletGlobal(code);
        if(res.ok){
          pal = res.pbc;
          pos = res.position;
          prod = res.product;
          stock = res.stock || {};
          rPos.value = pos.code || "";
          rProd.value = prod.barcode || "";
          unlockAfterPallet();
          if(rPalInfo) rPalInfo.innerHTML = `Origin: <b>${esc(pos.code)}</b> • ${esc(prod.name)} • UND ${Number(stock.qtyUnits||0)} • Pal ${Number(stock.qtyPallets||0)} • <b>${esc(stock.slotType||"PICKING")}</b>`;
          rMsg.innerHTML = msgBox("Palete OK. Escolhe <b>+ Adicionar</b> ou <b>− Retirar</b> e indica a quantidade.", "ok") + pickingWarning();
          enable();
          return;
        }
        if(res.reason==="multiplo"){
          const rows = res.rows || [];
          rMsg.innerHTML = `
            <div class="msg warn">
              Esta palete aparece em várias linhas. Escolhe:
              <div style="margin-top:8px;display:grid;gap:8px">
                ${rows.map((x,i)=>`
                  <button class="btn ghost" data-choice="${i}">
                    ${esc(x.position.code)} • ${esc(x.product.name)} • UND ${Number(x.stock.qtyUnits||0)} • Pal ${Number(x.stock.qtyPallets||0)}
                  </button>
                `).join("")}
              </div>
            </div>`;
          rMsg.querySelectorAll("[data-choice]").forEach(btn=>{
            btn.onclick = ()=>{
              const i = Number(btn.getAttribute("data-choice"));
              const pick = rows[i];
              pal = res.pbc;
              pos = pick.position;
              prod = pick.product;
              stock = pick.stock || {};
              rPos.value = pos.code || "";
              rProd.value = prod.barcode || "";
              unlockAfterPallet();
              if(rPalInfo) rPalInfo.innerHTML = `Origin: <b>${esc(pos.code)}</b> • ${esc(prod.name)} • <b>${esc(stock.slotType||"PICKING")}</b>`;
              rMsg.innerHTML = msgBox("Palete OK. Escolhe <b>+ Adicionar</b> ou <b>− Retirar</b> e indica a quantidade.", "ok") + pickingWarning();
              enable();
            };
          });
          return;
        }
        rMsg.innerHTML = msgBox("Pallet não encontrada no stock.", "err");
      }
  
      rPal.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); resolvePal(); }});
      rPal.addEventListener("change", makeScannerDebounce(()=>{ if(rPal.value) resolvePal(); }));
      rPal.addEventListener("blur",   makeScannerDebounce(()=>{ if(rPal.value) resolvePal(); }));
      const rPalOk=$("rPalOk"); if(rPalOk) rPalOk.addEventListener("click", ()=>resolvePal());
  
      rDo.onclick = async ()=>{
        try{
          if(!(pos && prod && pal)) throw new Error("Falta palete.");
          if(!mode) throw new Error("Escolhe + Adicionar ou − Retirar.");
          const qtyU=Math.floor(Number(rQtyU.value||0));
          const qtyP=Math.floor(Number(rQtyP.value||0));
          if(!(qtyU>0 || qtyP>0)) throw new Error("Falta QTD.");
          const sign = mode==="add" ? 1 : -1;
          rDo.disabled=true; rDo.textContent="A guardar...";
          window.__lastCapacityWarning = null;
          const _posCode = pos.code, _prodName = prod.name, _pal = pal;
          // FIX: usar positionId e productId EXACTOS do stockItem guardado no Firestore.
          // prod.id pode ser o id canónico que difere do productId legacy no stockItem,
          // fazendo o stockKey errar e ler curU=0 → "Stock insuficiente".
          const exactPositionId = (stock && stock.positionId) ? stock.positionId : pos.id;
          const exactProductId  = (stock && stock.productId)  ? stock.productId  : prod.id;
          const resolvedSlotType = (stock && stock.slotType)
            || (String(pos.code||"").toUpperCase().includes("PICK") ? "PICKING" : "COMPLETA");
          await addStock(exactPositionId, exactProductId, pal, resolvedSlotType, sign*qtyU, sign*qtyP, undefined, true /*skipDupCheck: palete já existe no Adjust*/);
          const verb = mode==="add" ? "ADICIONADO" : "RETIRADO";
          const sym = mode==="add" ? "+" : "-";
          const capWarn = window.__lastCapacityWarning ? `<div class="msg warn" style="margin-top:6px">⚠️ Sobrecarga: ${esc(window.__lastCapacityWarning.replace("⚠️ AVISO: ",""))}</div>` : "";
          reset();
          rMsg.innerHTML = msgBox(`✅ ${verb} • ${esc(_posCode)} • ${esc(_prodName)} • ${esc(_pal)} • ${sym}${qtyU} UND • ${sym}${qtyP} Pal`, "ok") + capWarn;
        }catch(err){
          rDo.disabled=false; rDo.textContent="Confirmar Ajuste";
          rMsg.innerHTML = msgBox("Erro: "+esc(err.message||err), "err");
        }
      };
    }

  function setupReplenish(){
    const opBack = document.getElementById("opBackBtn");
    if(opBack){ opBack.onclick = ()=>{ state.op="menu"; renderOperacao(); }; }
    const rpPal=$("rpPal"), rpManual=$("rpManual"), rpManualBox=$("rpManualBox"),
          rpFrom=$("rpFrom"), rpProd=$("rpProd"),
          rpTo=$("rpTo"), rpToPal=$("rpToPal"),
          rpQtyU=$("rpQtyU"), rpQtyP=$("rpQtyP"),
          rpOk=$("rpOk"), rpClear=$("rpClear");
    const rpMsg=$("rpMsg"), rpPalInfo=$("rpPalInfo"), rpToPalInfo=$("rpToPalInfo");

    let fromPos=null, toPos=null, prod=null;
    let palFrom=null, palTo=null;
    let fromSlotType="COMPLETA";
    let fromStock=null; // FIX: guardar stockItem exacto da palete origem

    function setMsg(text, kind){ rpMsg.innerHTML = msgBox(text, kind||"ok"); }

    async function populateReplenishStatuses(){
      try{
        const statuses = await ensureStatusesLoaded();
        const roStatus = $("roStatus");
        if(roStatus){
          roStatus.innerHTML = '<option value="" selected>(keep)</option>' +
            statuses.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");
        }
      }catch(_e){}
    }
    populateReplenishStatuses();

    function reset(){
      fromPos=toPos=prod=null;
      palFrom=palTo=null;
      fromSlotType="COMPLETA";

      // inputs
      rpPal.value="";
      if(rpFrom) rpFrom.value="";
      if(rpProd) rpProd.value="";
      rpTo.value=""; rpToPal.value="";
      rpQtyU.value=""; rpQtyP.value="";

      // states
      rpPal.disabled = false;
      if(rpManual){ rpManual.checked = false; }
      if(rpManualBox){ rpManualBox.style.display = "none"; }

      if(rpFrom) rpFrom.disabled = false;
      if(rpProd) rpProd.disabled = true;

      rpToPal.disabled = true;
      rpTo.disabled = true;
      rpQtyU.disabled = true;
      rpQtyP.disabled = true;

      rpOk.disabled = true;

      if(rpPalInfo) rpPalInfo.textContent = "";
      if(rpToPalInfo) rpToPalInfo.textContent = "";

      setMsg("Pica a PALETE ORIGEM. Se não tiver código, ativa “Sem código de palete”.", "warn");
      rpPal.focus();
    }

    function enable(){
      const u=Math.floor(Number(rpQtyU.value||0));
      const p=Math.floor(Number(rpQtyP.value||0));
      rpOk.disabled = !(fromPos && toPos && prod && (u>0 || p>0));
    }

    function unlockDestino(){
      rpToPal.disabled = false;
      rpTo.disabled = false;
      const rpToPalOk = $("rpToPalOk");
      const rpToOk    = $("rpToOk");
      if(rpToPalOk) rpToPalOk.disabled = false;
      if(rpToOk)    rpToOk.disabled    = false;
      // se já veio destino via palete, rpTo pode estar disabled, mas aqui é o modo normal
      if(!rpTo.disabled) rpTo.focus();
    }

    // ===== ORIGEM via PALETE
    async function resolveOriginByPallet(code){
      const res = await resolvePalletGlobal(code);
      if(res.ok){
        palFrom = res.pbc;
        fromPos = res.position;
        prod = res.product;
        fromStock = res.stock || null; // FIX
        fromSlotType = (res.stock && res.stock.slotType) ? res.stock.slotType : "COMPLETA";

        if(rpFrom) rpFrom.value = fromPos.code || "";
        if(rpProd) rpProd.value = prod.barcode || "";

        if(rpFrom) rpFrom.disabled = true;
        if(rpProd) rpProd.disabled = true;

        const s = res.stock || {};
        if(rpPalInfo) rpPalInfo.innerHTML = `Origin: <b>${esc(fromPos.code)}</b> • ${esc(prod.name)} • UND ${Number(s.qtyUnits||0)} • Pal ${Number(s.qtyPallets||0)}`;

        unlockDestino();
        setMsg("Origin OK. Agora (opcional) pica PALETE DESTINO e depois POSIÇÃO DESTINO.", "ok");
        return true;
      }

      if(res.reason==="multiplo"){
        const rows = res.rows || [];
        rpMsg.innerHTML = `
          <div class="msg warn">
            Pallet origem aparece em várias linhas. Escolhe:
            <div style="margin-top:8px;display:grid;gap:8px">
              ${rows.map((x,i)=>`
                <button class="btn ghost" data-choice="${i}">
                  ${esc(x.position.code)} • ${esc(x.product.name)} • UND ${Number(x.stock.qtyUnits||0)} • Pal ${Number(x.stock.qtyPallets||0)}
                </button>
              `).join("")}
            </div>
          </div>`;
        rpMsg.querySelectorAll("[data-choice]").forEach(btn=>{
          btn.onclick = ()=>{
            const i = Number(btn.getAttribute("data-choice"));
            const pick = rows[i];
            palFrom = res.pbc;
            fromPos = pick.position;
            prod = pick.product;
            fromStock = pick.stock || null; // FIX
            fromSlotType = (pick.stock && pick.stock.slotType) ? pick.stock.slotType : "COMPLETA";

            if(rpFrom) rpFrom.value = fromPos.code || "";
            if(rpProd) rpProd.value = prod.barcode || "";

            if(rpFrom) rpFrom.disabled = true;
            if(rpProd) rpProd.disabled = true;

            if(rpPalInfo) rpPalInfo.innerHTML = `Origin: <b>${esc(fromPos.code)}</b> • ${esc(prod.name)}`;
            unlockDestino();
            setMsg("Origin OK. Agora (opcional) pica PALETE DESTINO e depois POSIÇÃO DESTINO.", "ok");
          };
        });
        return false;
      }

      setMsg("Pallet origem não encontrada. Se não tiver código, ativa “Sem código de palete”.", "err");
      return false;
    }

    // ===== DESTINO via PALETE (opcional): se existir, valida produto e pode auto-definir posição
    async function handleDestinoPallet(code){
      const res = await resolvePalletGlobal(code);
      if(res.ok){
        if(res.product && prod && ((res.productCanonicalId || res.product.id) !== (prod.productCanonicalId || prod.id))){
          setMsg("A palete destino é de outro produto. Usa uma palete destino do mesmo produto.", "err");
          palTo = null;
          if(rpToPalInfo) rpToPalInfo.textContent = "";
          return;
        }
        palTo = res.pbc;
        toPos = res.position;

        rpTo.value = toPos.code || "";
        rpTo.disabled = true;

        const s = res.stock || {};
        if(rpToPalInfo) rpToPalInfo.innerHTML = `Destino: <b>${esc(toPos.code)}</b> • UND ${Number(s.qtyUnits||0)} • Pal ${Number(s.qtyPallets||0)}`;

        rpQtyU.disabled = false;
        rpQtyP.disabled = false;
        rpQtyU.focus();
        enable();
        setMsg("Destino OK. Agora indica quantidades.", "ok");
        return;
      }

      // não encontrada: aceita como "vai criar/atualizar" mas precisa posição
      palTo = code;
      if(rpToPalInfo) rpToPalInfo.textContent = "Não existe no stock (vai ser criada/atualizada no destino).";
      rpTo.disabled = false;
      rpTo.focus();
      setMsg("Agora pica a POSIÇÃO DESTINO.", "warn");
    }

    // ===== eventos
    rpClear.onclick = reset;

    rpQtyU.addEventListener("input", enable);
    rpQtyP.addEventListener("input", enable);

    // toggle manual
    if(rpManual){
      rpManual.onchange = ()=>{
        const on = !!rpManual.checked;
        if(rpManualBox) rpManualBox.style.display = on ? "" : "none";
        if(on){
          // manual: limpa palete e desbloqueia campos
          palFrom = null;
          fromPos = null;
          prod = null;
          rpPal.value = "";
          if(rpPalInfo) rpPalInfo.textContent = "";
          if(rpFrom) { rpFrom.disabled = false; rpFrom.value = ""; rpFrom.focus(); }
          if(rpProd) { rpProd.disabled = true; rpProd.value = ""; }
          // bloquear destino até ter produto
          rpToPal.disabled = true;
          rpTo.disabled = true;
          rpQtyU.disabled = true;
          rpQtyP.disabled = true;
          rpOk.disabled = true;
          setMsg("Modo manual: ORIGEM → PRODUTO.", "warn");
        }else{
          reset();
        }
      };
    }

    // palete origem enter / change / blur (suporte scanner)
    async function resolveOriginPalletIfNeeded(){
      if(rpManual && rpManual.checked) return;
      const code = normalizeBarcode(rpPal.value);
      if(!code){ setMsg("Pica a palete origem.", "warn"); return; }
      await resolveOriginByPallet(code);
    }
    rpPal.addEventListener("keydown", async (e)=>{
      if(e.key!=="Enter") return;
      e.preventDefault();
      await resolveOriginPalletIfNeeded();
    });
    rpPal.addEventListener("change", makeScannerDebounce(async ()=>{ if(rpPal.value) await resolveOriginPalletIfNeeded(); }));
    rpPal.addEventListener("blur",   makeScannerDebounce(async ()=>{ if(rpPal.value) await resolveOriginPalletIfNeeded(); }));

    // manual origin
    if(rpFrom){
      rpFrom.addEventListener("keydown", async (e)=>{
        if(e.key!=="Enter") return;
        e.preventDefault();
        if(!(rpManual && rpManual.checked)) return;
        const code = normalizeBarcode(rpFrom.value);
        const p = await getPositionByCode(code);
        if(!p){ setMsg("Origin não encontrada.", "err"); return; }
        fromPos = p;
        if(rpProd){ rpProd.disabled = false; rpProd.focus(); }
        setMsg("Origin OK. Agora pica o produto.", "ok");
      });
    }

    if(rpProd){
      rpProd.addEventListener("keydown", async (e)=>{
        if(e.key!=="Enter") return;
        e.preventDefault();
        if(!(rpManual && rpManual.checked)) return;
        if(!fromPos){ setMsg("Primeiro pica a origem.", "warn"); return; }
        const bc = normalizeBarcode(rpProd.value);
        const p = await getProductByBarcode(bc);
        if(!p){ setMsg("Produto não encontrado.", "err"); return; }
        prod = p;
        fromSlotType = "COMPLETA";
        unlockDestino();
        setMsg("Produto OK. Agora (opcional) palete destino e posição destino.", "ok");
      });
    }

    // destino palete optional
    async function resolveDestinoPallet(){
      if(!prod){ setMsg("Primeiro define a origem.", "warn"); return; }
      const code = normalizeBarcode(rpToPal.value);
      if(!code){
        palTo = null;
        if(rpToPalInfo) rpToPalInfo.textContent = "";
        rpTo.disabled = false;
        rpTo.focus();
        setMsg("Pica a posição destino.", "warn");
        return;
      }
      await handleDestinoPallet(code);
    }
    rpToPal.addEventListener("keydown", async (e)=>{
      if(e.key!=="Enter") return;
      e.preventDefault();
      await resolveDestinoPallet();
    });
    rpToPal.addEventListener("change", async ()=>{ if(rpToPal.value) await resolveDestinoPallet(); });
    rpToPal.addEventListener("blur",   async ()=>{ if(rpToPal.value) await resolveDestinoPallet(); });
    const rpToPalOk = $("rpToPalOk");
    if(rpToPalOk) rpToPalOk.addEventListener("click", ()=>resolveDestinoPallet());

    // destino posição
    async function resolveDestinoPos(){
      if(!prod){ setMsg("Primeiro define a origem.", "warn"); return; }
      if(rpTo.disabled) return; // já definido via palete destino
      const code = normalizeBarcode(rpTo.value);
      if(!code) return;
      const p = await getPositionByCode(code);
      if(!p){ setMsg("Destino não encontrado.", "err"); return; }
      toPos = p;
      rpQtyU.disabled = false;
      rpQtyP.disabled = false;
      rpQtyU.focus();
      setMsg("Destino OK. Agora indica quantidades.", "ok");
      enable();
    }
    rpTo.addEventListener("keydown", async (e)=>{
      if(e.key!=="Enter") return;
      e.preventDefault();
      await resolveDestinoPos();
    });
    rpTo.addEventListener("change", async ()=>{ if(rpTo.value) await resolveDestinoPos(); });
    rpTo.addEventListener("blur",   async ()=>{ if(rpTo.value) await resolveDestinoPos(); });
    const rpToOk = $("rpToOk");
    if(rpToOk) rpToOk.addEventListener("click", ()=>resolveDestinoPos());

    // confirmar
    rpOk.onclick = async ()=>{
      try{
        if(!(fromPos && toPos && prod)) throw new Error("Falta origem/destino/produto.");
        const qtyU=Math.floor(Number(rpQtyU.value||0));
        const qtyP=Math.floor(Number(rpQtyP.value||0));
        if(!(qtyU>0 || qtyP>0)) throw new Error("Falta quantidade.");

        const srcPallet = palFrom ? palFrom : (rpPal.value || "");
        const dstPallet = palTo ? palTo : (rpToPal.value || "");

        rpOk.disabled=true; rpOk.textContent="A processar...";
        // FIX: usar productId exacto do stockItem da palete origem
        const rpExactProductId = (fromStock && fromStock.productId) ? fromStock.productId : prod.id;
        const rpExactFromId    = (fromStock && fromStock.positionId) ? fromStock.positionId : fromPos.id;
        await transferReplenish(rpExactFromId, toPos.id, rpExactProductId, srcPallet, dstPallet, qtyU, qtyP);

        setMsg(`✅ Reabastecido • ${esc(fromPos.code)} → ${esc(toPos.code)} • ${esc(prod.name)} • ${qtyU} UND • ${qtyP} Pal`, "ok");
        rpQtyU.value=""; rpQtyP.value="";
        rpOk.disabled=false; rpOk.textContent="Confirm";
        rpQtyU.focus();
        enable();
      }catch(err){
        rpOk.disabled=false; rpOk.textContent="Confirm";
        setMsg("Erro: "+esc(err.message||err), "err");
      }
    };

    reset();
  }

  async function loadPositionById(id){
    if(!id) return null;
    if(__positionByIdCache.has(id)) return __positionByIdCache.get(id);
    const snap = await getDoc(doc(db, COL_POSITIONS, id));
    return snap.exists() ? cachePositionRecord({ id: snap.id, ...snap.data() }) : null;
  }
  async function loadProductById(id){
    if(!id) return null;
    if(Array.isArray(state.cache.productsRaw) && state.cache.productsRaw.length){
      const found = state.cache.productsRaw.find(p=>p.id===id);
      if(found) return found;
    }
    if(__productsMapPromise){
      try{
        const prodMap = await __productsMapPromise;
        if(prodMap.has(id)) return prodMap.get(id);
      }catch(_e){}
    }
    const snap = await getDoc(doc(db, COL_PRODUCTS, id));
    if(snap.exists()) return ({ id: snap.id, ...snap.data() });
    const mapSnap = await getDoc(doc(db, COL_PRODUCT_BARCODES, id));
    if(mapSnap.exists()){
      const pid = mapSnap.data().productId;
      const p2 = await getDoc(doc(db, COL_PRODUCTS, pid));
      if(p2.exists()) return ({ id: pid, ...p2.data(), legacyId:id });
    }
    return null;
  }

  async function listStockByPallet(palletBarcode){

    if(!pbc) return [];
    const qy = query(collection(db, COL_STOCK), where("palletBarcode","==",pbc));
    const snap = await getDocs(qy);

  async function deletePalletEverywhere(palletBarcode){
    const user = auth.currentUser;
    if(!user) throw new Error("Not signed in.");
    if(!canOperate(user)) throw new Error("No permission.");

    const pbc = normalizeBarcode(palletBarcode);
    if(!pbc) throw new Error("Pallet inválida.");

    const rows = await listStockByPallet(pbc);
    if(rows.length===0) throw new Error("Esta palete não existe no stock.");

    // batch delete + log movements
    let batch = writeBatch(db);
    let ops = 0;

    for(const r of rows){
      const ref = doc(db, COL_STOCK, r.id);
      batch.delete(ref);
      const mvRef = doc(collection(db, COL_MOVEMENTS));
      batch.set(mvRef, {
        type: "ELIMINAR_PALETE",
        ts: serverTimestamp(),
        userId: user.uid,
        userEmail: (user.email||""),
        userLabel: ((user.email||"").split("@")[0]||""),
        positionId: r.positionId || "",
        productId: r.productId || "",
        palletBarcode: pbc,
        slotType: r.slotType || "",
        qtyUnits: Number(r.qtyUnits||0),
        qtyPallets: Number(r.qtyPallets||0),
        origin: r.origin || "",
      });
      ops += 2;

      if(ops >= 400){
        await batch.commit();
        batch = writeBatch(db);
        ops = 0;
      }
    }
    if(ops>0) await batch.commit();
    invalidateDerivedCaches();
    return rows.length;
  }

  async function resolveCanonicalProductsForIds(rawProdIds){
    const ids = Array.from(new Set((rawProdIds||[]).filter(Boolean)));
    const prodMap = await getProductsMapCached();
    const out = new Map();

    await Promise.all(ids.map(async (rawId)=>{
      let pr = prodMap.get(rawId);
      if(!pr){
        try{
          const mapSnap = await getDoc(doc(db, COL_PRODUCT_BARCODES, rawId));
          if(mapSnap.exists()){
            const canonicalPid = mapSnap.data().productId;
            pr = prodMap.get(canonicalPid);
          }
        }catch(_e){}
      }

      const name = String(pr?.name || rawId || "").trim() || rawId;
      const canonicalId = productIdFromName(name) || rawId;
      const barcodes = Array.isArray(pr?.barcodes)
        ? pr.barcodes.map(b=>normalizeBarcode(b)).filter(Boolean)
        : (pr?.barcode ? [normalizeBarcode(pr.barcode)].filter(Boolean) : []);

      out.set(rawId, {
        rawId,
        canonicalId,
        name,
        barcodes
      });
    }));

    return out;
  }

  async function computeStockTotalsByProduct(){
      const snap = await getDocs(collection(db, COL_STOCK));
      // reutilizar este snapshot para totais gerais (evita uma 2ª leitura)
      __stockSnapPromise = Promise.resolve(snap);

// 1) carregar produtos (cache)
      const prodMap = await getProductsMapCached();

      // 2) Agregar por PRODUTO CANÓNICO (derivado do nome), não por barcode/productId
      // canonicalId -> {name, barcodes:Set, completeU,completeP,pickingU,pickingP,palletsComplete:Set,palletsPicking:Set}
      const map = new Map();

      for(const d of snap.docs){
        const x = d.data() || {};
        const rawPid = x.productId || "";
        if(!rawPid) continue;

        // tenta ir buscar produto diretamente
        let pr = prodMap.get(rawPid);

        // fallback “legacy”: se o stock tiver productId como barcodeKey, tenta mapping em COL_PRODUCT_BARCODES
        if(!pr){
          try{
            const mapSnap = await getDoc(doc(db, COL_PRODUCT_BARCODES, rawPid));
            if(mapSnap.exists()){
              const canonicalPid = mapSnap.data().productId;
              pr = prodMap.get(canonicalPid) || pr;
            }
          }catch(_e){}
        }

        const name = String(pr?.name || "").trim() || rawPid;
        const canonicalId = productIdFromName(name) || rawPid;

        if(!map.has(canonicalId)){
          map.set(canonicalId, {
            name,
            barcodes: new Set(),
            completeU:0, completeP:0,
            pickingU:0, pickingP:0,
            palletsComplete:new Set(),
            palletsPicking:new Set()
          });
        }

        const t = map.get(canonicalId);

        // acumular barcodes conhecidos do produto
        for(const b of getProductBarcodes(pr)) t.barcodes.add(b);

        const slot = String(x.slotType||"PICKING").toUpperCase();
        const u = Number(x.qtyUnits||0);
        const p = Number(x.qtyPallets||0);
        const pal = normalizeBarcode(x.palletBarcode||"");

        if(slot==="COMPLETA"){
          t.completeU += u;
          t.completeP += p;
          if(pal) t.palletsComplete.add(pal);
        }else{
          t.pickingU += u;
          t.pickingP += p;
          if(pal) t.palletsPicking.add(pal);
        }
      }

      // 3) construir rows (1 linha por produto canónico)
      const rows = [];
      map.forEach((t, canonicalId)=>{
        rows.push({
          productId: canonicalId,
          name: t.name,
          barcode: Array.from(t.barcodes).join(", "),
          UND_COMPLETA: t.completeU,
          PAL_COMPLETA: t.completeP,
          N_PALETES_COMPLETA: t.palletsComplete.size,
          UND_PICKING: t.pickingU,
          PAL_PICKING: t.pickingP,
          N_PALETES_PICKING: t.palletsPicking.size
        });
      });

      rows.sort((a,b)=> (a.name||"").localeCompare(b.name||""));
      return rows;
    }

  function toCSVSemicolon(rows){
    const headers = ["produto","barcode","UND_COMPLETA","PAL_COMPLETA","N_PALETES_COMPLETA","UND_PICKING","PAL_PICKING","N_PALETES_PICKING"];
    const lines = [headers.join(";")];
    for(const r of rows){
      const vals = [
        (r.name||"").replace(/;/g,","),
        (r.barcode||""),
        r.UND_COMPLETA||0, r.PAL_COMPLETA||0, r.N_PALETES_COMPLETA||0,
        r.UND_PICKING||0, r.PAL_PICKING||0, r.N_PALETES_PICKING||0
      ];
      lines.push(vals.join(";"));
    }
    return lines.join("\n");
  }

  function downloadText(filename, text){
    const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }

  function setupLookupProduto(){
    const inp = $("cpProd"), go = $("cpGo"), clear = $("cpClear");
    const msg = $("cpMsg"), info = $("cpProdInfo"), results = $("cpResults");
    let chosen = null;

    const reset=()=>{ chosen=null; inp.value=""; info.textContent=""; msg.innerHTML=""; results.innerHTML=""; inp.focus(); };

    async function getProductsGrouped(){
      return await getProductsGroupedCached();
    }

    async function pickByText(txt){
      const q = normalizeProductName(txt);
      if(!q) return null;

      const list = await getProductsGrouped();
      let hits = list.filter(p=>normalizeProductName(p.name)===q);
      if(hits.length===0) hits = list.filter(p=>normalizeProductName(p.name).includes(q));
      if(hits.length===0) return null;
      if(hits.length===1) return hits[0];

      results.innerHTML = `
        <div class="hint">Foram encontrados <b>${hits.length}</b> produtos. Refina a pesquisa ou escolhe um:</div>
        <div style="overflow:auto;margin-top:8px">
          <table>
            <thead><tr><th>Produto</th><th>#Barcodes</th><th></th></tr></thead>
            <tbody>
              ${hits.slice(0,50).map((p,i)=>`
                <tr>
                  <td>${esc(p.name)}</td>
                  <td><b>${p.barcodes.length}</b></td>
                  <td><button class="btn ok" data-pick="${i}">Usar</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
        ${hits.length>50?`<div class="hint">A mostrar os primeiros 50. Refina a pesquisa para ver menos.</div>`:""}
      `;
      results.querySelectorAll("[data-pick]").forEach(btn=>{
        btn.onclick = async ()=>{
          const idx = Number(btn.getAttribute("data-pick"));
          const p = hits.slice(0,50)[idx];
          if(!p) return;
          inp.value = p.name;
          await run(p);
        };
      });
      return "__PICKING__";
    }

    async function queryStockForProductIds(productIds){
      const ids = Array.from(new Set((productIds||[]).filter(Boolean)));
      if(ids.length===0) return [];

      const chunks = [];
      const maxIn = 30;
      for(let i=0;i<ids.length;i+=maxIn) chunks.push(ids.slice(i,i+maxIn));

      const all = [];
      const seen = new Set();
      for(const ch of chunks){
        const qy = query(collection(db, COL_STOCK), where("productId","in", ch));
        const snap = await getDocs(qy);
        snap.forEach(d=>{
          if(seen.has(d.id)) return;
          seen.add(d.id);
          all.push(d.data());
        });
      }
      return all;
    }

    async function run(preset=null){
      try{
        msg.innerHTML=""; results.innerHTML="";
        const sel = preset || await pickByText(inp.value);
        if(sel==="__PICKING__") return;
        if(!sel) throw new Error("Produto não encontrado (procura por nome/SKU).");
        chosen = sel;
        info.textContent = "✅ " + (chosen.name||"");

        const rowsAll = await queryStockForProductIds(chosen.productIds || [chosen.id]);
        const grouped = new Map();

        for(const x of rowsAll){
          const qtyUnits = Number(x.qtyUnits||0);
          const qtyPallets = Number(x.qtyPallets||0);
          if(!(qtyUnits>0 || qtyPallets>0)) continue;

          const slotType = String(x.slotType||"PICKING").toUpperCase();
          const palletBarcode = normalizeBarcode(x.palletBarcode||"");
          const status = String(x.status||"");
          const key = [x.positionId||"", palletBarcode, slotType, status].join("||");

          if(!grouped.has(key)){
            grouped.set(key, {
              positionId: x.positionId || "",
              palletBarcode,
              slotType,
              status,
              qtyUnits: 0,
              qtyPallets: 0
            });
          }
          const g = grouped.get(key);
          g.qtyUnits += qtyUnits;
          g.qtyPallets += qtyPallets;
        }

        const rows = Array.from(grouped.values());
        if(rows.length===0){ results.innerHTML = msgBox("Sem stock em posições.", "warn"); return; }

        const posIds = Array.from(new Set(rows.map(r=>r.positionId).filter(Boolean)));
        const posDocs = await Promise.all(posIds.map(id=>getDoc(doc(db, COL_POSITIONS, id))));
        const posMap = new Map();
        posIds.forEach((id, i)=>{
          const ps = posDocs[i];
          posMap.set(id, ps.exists() ? (ps.data().code || id) : id);
        });

        const view = rows.map(r=>({
          posCode: posMap.get(r.positionId) || r.positionId,
          palletBarcode: r.palletBarcode || "",
          slotType: r.slotType || "PICKING",
          qtyUnits: Number(r.qtyUnits||0),
          qtyPallets: Number(r.qtyPallets||0),
          status: r.status || ""
        })).sort((a,b)=>{
          const posCmp = (a.posCode||"").localeCompare(b.posCode||"", "pt", {sensitivity:"base"});
          if(posCmp!==0) return posCmp;
          return (a.palletBarcode||"").localeCompare(b.palletBarcode||"", "pt", {sensitivity:"base"});
        });

        results.innerHTML = `
          <div class="hint" style="margin-bottom:8px">Resultado agrupado por <b>produto</b> (mesmo produto com vários barcodes aparece junto).</div>
          <div style="overflow:auto">
            <table>
              <thead><tr><th>Location</th><th>Pallet</th><th>Status</th><th>Tipo</th><th>UND</th><th>Pal</th></tr></thead>
              <tbody>
                ${view.map(v=>{
                  const slotBadge = v.slotType==="COMPLETA"
                    ? `<span style="background:rgba(23,143,99,.15);color:var(--ok);border:1px solid rgba(23,143,99,.3);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700">COMPLETA</span>`
                    : `<span style="background:rgba(31,138,112,.10);color:var(--accent);border:1px solid rgba(31,138,112,.25);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700">PICKING</span>`;
                  return `<tr>
                    <td><span class="mono">${esc(v.posCode)}</span></td>
                    <td><span class="mono">${esc(v.palletBarcode || "—")}</span></td>
                    <td>${esc(v.status || "—")}</td>
                    <td>${slotBadge}</td>
                    <td><b>${v.qtyUnits}</b></td><td><b>${v.qtyPallets}</b></td>
                  </tr>`;
                }).join("")}
              </tbody>
            </table>
          </div>
        `;
      }catch(err){ msg.innerHTML = msgBox("Erro: "+esc(err.message||err), "err"); }
    }

    inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); run(); }});
    go.onclick = ()=>run();
    clear.onclick = reset;
    reset();
  }

      if(!productId) return "";

          const canonical = prodMap.get(canonicalPid);
          if(canonical && canonical.name) name = String(canonical.name||"").trim() || name;
        }

      return name;

  // ===== Export CSV (separador ;) =====
  function downloadTextFile(filename, text){
    const blob = new Blob([text], {type:"text/csv;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
  function sanitizeBarcodeExport(v){
    const s = (v ?? "").toString().trim();
    // remover prefixos comuns indesejados (ex.: `123, '123)
    return s.replace(/^([`']+)\s*/, "");
  }

  function csvEscape(v){
    const s = (v ?? "").toString();
    if(/[;\n"]/g.test(s)) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }

  
  async function exportProductsCSV(){
    const snap = await getDocs(collection(db, COL_PRODUCTS));
    const rows = snap.docs.map(d=>({id:d.id, ...d.data()}))
      .sort((a,b)=>(a.name||"").localeCompare(b.name||"", "pt", {sensitivity:"base"}));

    // Export: one line per barcode (A=produto, B=barcode)
    const header = ["produto","barcode"].join(";");
    const lines = [];
    rows.forEach(r=>{
      const bars = Array.isArray(r.barcodes) ? r.barcodes : (r.barcode ? [r.barcode] : []);
      if(bars.length===0){
        lines.push([csvEscape(r.name||""), ""].join(";"));
      }else{
        bars.forEach(b=>{
          lines.push([csvEscape(r.name||""), csvEscape(sanitizeBarcodeExport(b||""))].join(";"));
        });
      }
    });

    downloadTextFile(`produtos_${new Date().toISOString().slice(0,10)}.csv`, [header, ...lines].join("\n"));
  }

async function exportStockCSV(){
    const snap = await getDocs(collection(db, COL_STOCK));
    const rows = snap.docs.map(d=>({id:d.id, ...d.data()}));

    const posIds = [...new Set(rows.map(r=>r.positionId).filter(Boolean))];
    const prodIds = [...new Set(rows.map(r=>r.productId).filter(Boolean))];

    const posSnaps = await Promise.all(posIds.map(id=>getDoc(doc(db, COL_POSITIONS, id))));
    const posMap = new Map(posIds.map((id,i)=>[id, posSnaps[i].exists() ? (posSnaps[i].data().code || id) : id]));
    const prodInfoMap = await resolveCanonicalProductsForIds(prodIds);

    const header = ["posicao","produto","barcode","palletBarcode","tipo","status","origem","qtyUnits","qtyPallets","updatedAt"].join(";");
    const lines = rows.map(r=>{
      const code = posMap.get(r.positionId) || r.positionId || "";
      const info = prodInfoMap.get(r.productId) || { name:(r.productId || ""), barcodes:[] };
      const name = info.name || r.productId || "";
      const barcode = (info.barcodes||[]).map(b=>sanitizeBarcodeExport(b||"")).join(", ");
      const upd = r.updatedAt && r.updatedAt.toDate ? r.updatedAt.toDate().toISOString() : "";
      return [
        csvEscape(code),
        csvEscape(name),
        csvEscape(barcode),
        csvEscape(r.palletBarcode || ""),
        csvEscape(r.slotType || ""),
        csvEscape(r.status || ""),
        csvEscape(r.origin || ""),
        csvEscape(Number(r.qtyUnits||0)),
        csvEscape(Number(r.qtyPallets||0)),
        csvEscape(upd),
      ].join(";");
    });

    downloadTextFile(`stock_${new Date().toISOString().slice(0,10)}.csv`, [header, ...lines].join("\n"));
  }

  async function exportMovementsCSV(){
    const u = auth.currentUser;
    const snap = await getDocs(collection(db, COL_MOVEMENTS));
    const rows = snap.docs.map(d=>({id:d.id, ...d.data()}));

    const header = ["ts","type","userId","userEmail","userLabel","positionId","fromPositionId","toPositionId","productId","palletBarcode","slotType","qtyUnits","qtyPallets"].join(";");
    const lines = rows
      .sort((a,b)=>{
        const ta = (a.ts && a.ts.toDate) ? a.ts.toDate().getTime() : 0;
        const tb = (b.ts && b.ts.toDate) ? b.ts.toDate().getTime() : 0;
        return tb - ta;
      })
      .map(r=>{
        const ts = (r.ts && r.ts.toDate) ? r.ts.toDate().toISOString() : "";
        return [
          csvEscape(ts),
          csvEscape(r.type || ""),
          csvEscape(r.userId || ""),
          csvEscape(r.userEmail || ""),
          csvEscape(r.userLabel || (r.userEmail||"").split("@")[0] || ""),
          csvEscape(r.positionId || ""),
          csvEscape(r.fromPositionId || ""),
          csvEscape(r.toPositionId || ""),
          csvEscape(r.productId || ""),
          csvEscape(r.palletBarcode || ""),
          csvEscape(r.slotType || ""),
          csvEscape(Number(r.qtyUnits||0)),
          csvEscape(Number(r.qtyPallets||0)),
        ].join(";");
      });

    downloadTextFile(`movimentos_${new Date().toISOString().slice(0,10)}.csv`, [header, ...lines].join("\n"));
  }

  async function computeTotalsByProduct(){
    const rows = await computeStockTotalsByProduct();
    return rows.map(r=>({
      productId: r.productId,
      name: r.name || r.productId || "",
      barcode: r.barcode || "",
      qtyUnits: Number(r.UND_COMPLETA||0) + Number(r.UND_PICKING||0),
      qtyPallets: Number(r.PAL_COMPLETA||0) + Number(r.PAL_PICKING||0)
    }));
  }

  async function computeGlobalTotals(){
    // Usa cache do snapshot de stock quando disponível; caso contrário carrega 1x e reutiliza.
    if(!__stockSnapPromise){
      __stockSnapPromise = getDocs(collection(db, COL_STOCK));
    }
    const stockSnap = await __stockSnapPromise;

    let totalUnits = 0;
    let totalPallets = 0;
    stockSnap.forEach(d=>{
      const x = d.data() || {};
      totalUnits += Number(x.qtyUnits||0);
      totalPallets += Number(x.qtyPallets||0);
    });
    return { totalUnits, totalPallets, rows: stockSnap.size };
  }

    ].join(";"));
    downloadTextFile(`totais_produto_${new Date().toISOString().slice(0,10)}.csv`, [header, ...lines].join("\n"));

  async function cancelMovement(mvId, reason){
    const user = auth.currentUser;
    if(!user) throw new Error("Not signed in.");
    if(!isAdminUser(user)) throw new Error("No permission.");

    const mvRef = doc(db, COL_MOVEMENTS, mvId);

    await runTransaction(db, async (tx)=>{
      // 1) READS (all)
      const mvSnap = await tx.get(mvRef);
      if(!mvSnap.exists()) throw new Error("Movimento não existe.");
      const mv = mvSnap.data();
      if(mv.cancelled) throw new Error("Já anulado.");
      const type = (mv.type||"").toUpperCase();
      if(!["ARRUMAR","RETIRAR","MUDAR"].includes(type)) throw new Error("Não suportado para anular.");

      const writes = []; // functions(tx) to execute after reads

      if(type==="ARRUMAR"){
        const pos = mv.positionId, prod = mv.productId, pal = mv.palletBarcode||"", slot = mv.slotType||"PICKING";
        const u = Number(mv.qtyUnits||0), p = Number(mv.qtyPallets||0);
        const stockRef = doc(db, COL_STOCK, stockKey(pos, prod, palletIdFromBarcode(pal)));
        const snap = await tx.get(stockRef);
        const curU = snap.exists()? Number(snap.data().qtyUnits||0):0;
        const curP = snap.exists()? Number(snap.data().qtyPallets||0):0;
        const nextU = curU - u;
        const nextP = curP - p;
        if(nextU < 0 || nextP < 0) throw new Error("Não dá para anular: stock insuficiente.");

        writes.push((tx)=>{
          if(nextU===0 && nextP===0) tx.delete(stockRef);
          else tx.set(stockRef, { qtyUnits:nextU, qtyPallets:nextP, updatedAt:serverTimestamp() }, {merge:true});
        });
      }else if(type==="RETIRAR"){
        const pos = mv.positionId, prod = mv.productId, pal = mv.palletBarcode||"", slot = mv.slotType||"PICKING";
        const u = Number(mv.qtyUnits||0), p = Number(mv.qtyPallets||0);
        const stockRef = doc(db, COL_STOCK, stockKey(pos, prod, palletIdFromBarcode(pal)));
        const snap = await tx.get(stockRef);
        const curU = snap.exists()? Number(snap.data().qtyUnits||0):0;
        const curP = snap.exists()? Number(snap.data().qtyPallets||0):0;
        const nextU = curU + u;
        const nextP = curP + p;

        writes.push((tx)=>{
          tx.set(stockRef, { positionId:pos, productId:prod, palletBarcode:normalizeBarcode(pal), slotType:slot, qtyUnits:nextU, qtyPallets:nextP, updatedAt:serverTimestamp() }, {merge:true});
        });
      }else if(type==="MUDAR"){
        const from = mv.fromPositionId, to = mv.toPositionId, prod = mv.productId, pal = mv.palletBarcode||"";
        const u = Number(mv.qtyUnits||0), p = Number(mv.qtyPallets||0);
        const palId = palletIdFromBarcode(pal);
        const fromRef = doc(db, COL_STOCK, stockKey(from, prod, palId));
        const toRef = doc(db, COL_STOCK, stockKey(to, prod, palId));

        const toSnap = await tx.get(toRef);
        const toU = toSnap.exists()? Number(toSnap.data().qtyUnits||0):0;
        const toP = toSnap.exists()? Number(toSnap.data().qtyPallets||0):0;
        const toType = toSnap.exists()? (toSnap.data().slotType||"PICKING") : "PICKING";
        if(toU < u || toP < p) throw new Error("Não dá para anular: destino sem stock suficiente.");
        const nextToU = toU - u;
        const nextToP = toP - p;

        const fromSnap = await tx.get(fromRef);
        const fromU = fromSnap.exists()? Number(fromSnap.data().qtyUnits||0):0;
        const fromP = fromSnap.exists()? Number(fromSnap.data().qtyPallets||0):0;
        const fromType = fromSnap.exists()? (fromSnap.data().slotType||toType) : toType;

        writes.push((tx)=>{
          if(nextToU===0 && nextToP===0) tx.delete(toRef);
          else tx.set(toRef, { qtyUnits:nextToU, qtyPallets:nextToP, updatedAt:serverTimestamp() }, {merge:true});
          tx.set(fromRef, { positionId:from, productId:prod, palletBarcode:normalizeBarcode(pal), slotType:fromType, qtyUnits:fromU + u, qtyPallets:fromP + p, updatedAt:serverTimestamp() }, {merge:true});
        });
      }

      // 2) WRITES (after all reads)
      tx.set(mvRef, { cancelled:true, cancelledAt:serverTimestamp(), cancelledBy:user.uid, cancelledByEmail:(user.email||""), cancelReason:reason }, {merge:true});
      for(const w of writes) w(tx);

      const mv2Ref = doc(collection(db, COL_MOVEMENTS));
      tx.set(mv2Ref, { type:"ANULACAO", ts:serverTimestamp(), userId:user.uid, userEmail:(user.email||""), refMovementId:mvId, reason }, {merge:true});
    });
    invalidateDerivedCaches();
  }

  async function editMovement(mvId, patch, reason){
    const user = auth.currentUser;
    if(!user) throw new Error("Not signed in.");
    if(!isAdminUser(user)) throw new Error("No permission.");

    const mvRef = doc(db, COL_MOVEMENTS, mvId);

    await runTransaction(db, async (tx)=>{
      // 1) READS (all)
      const mvSnap = await tx.get(mvRef);
      if(!mvSnap.exists()) throw new Error("Movimento não existe.");
      const mv = mvSnap.data();
      if(mv.cancelled) throw new Error("Já anulado.");
      const type = (mv.type||"").toUpperCase();
      if(!["ARRUMAR","RETIRAR","MUDAR"].includes(type)) throw new Error("Não suportado para editar.");

      const oldU = Number(mv.qtyUnits||0), oldP = Number(mv.qtyPallets||0);
      const newU = Number(patch.qtyUnits||0), newP = Number(patch.qtyPallets||0);
      const dU = newU - oldU;
      const dP = newP - oldP;

      const writes = [];

      if(type==="ARRUMAR"){
        const pos = mv.positionId, prod = mv.productId, pal = mv.palletBarcode||"";
        const slot = patch.slotType ? patch.slotType : (mv.slotType||"PICKING");
        const stockRef = doc(db, COL_STOCK, stockKey(pos, prod, palletIdFromBarcode(pal)));
        const snap = await tx.get(stockRef);
        const curU = snap.exists()? Number(snap.data().qtyUnits||0):0;
        const curP = snap.exists()? Number(snap.data().qtyPallets||0):0;
        const nextU = curU + dU;
        const nextP = curP + dP;
        if(nextU < 0 || nextP < 0) throw new Error("Edição inválida: stock ficaria negativo.");

        writes.push((tx)=>{
          if(nextU===0 && nextP===0) tx.delete(stockRef);
          else tx.set(stockRef, { positionId:pos, productId:prod, palletBarcode:normalizeBarcode(pal), slotType:slot, qtyUnits:nextU, qtyPallets:nextP, updatedAt:serverTimestamp() }, {merge:true});
        });
      }else if(type==="RETIRAR"){
        const pos = mv.positionId, prod = mv.productId, pal = mv.palletBarcode||"";
        const slot = patch.slotType ? patch.slotType : (mv.slotType||"PICKING");
        const stockRef = doc(db, COL_STOCK, stockKey(pos, prod, palletIdFromBarcode(pal)));
        const snap = await tx.get(stockRef);
        const curU = snap.exists()? Number(snap.data().qtyUnits||0):0;
        const curP = snap.exists()? Number(snap.data().qtyPallets||0):0;
        const nextU = curU - dU; // retirar: movimento retirou stock, ajustar inversamente
        const nextP = curP - dP;
        if(nextU < 0 || nextP < 0) throw new Error("Edição inválida: stock ficaria negativo.");

        writes.push((tx)=>{
          if(nextU===0 && nextP===0) tx.delete(stockRef);
          else tx.set(stockRef, { positionId:pos, productId:prod, palletBarcode:normalizeBarcode(pal), slotType:slot, qtyUnits:nextU, qtyPallets:nextP, updatedAt:serverTimestamp() }, {merge:true});
        });
      }else if(type==="MUDAR"){
        const from = mv.fromPositionId, to = mv.toPositionId, prod = mv.productId, pal = mv.palletBarcode||"";
        const palId = palletIdFromBarcode(pal);
        const fromRef = doc(db, COL_STOCK, stockKey(from, prod, palId));
        const toRef = doc(db, COL_STOCK, stockKey(to, prod, palId));

        // Para MUDAR: editar ajusta a diferença entre novo e antigo (dU/dP) movida do from->to.
        // Ou seja: se aumentares unidades, tens de tirar mais do FROM e pôr mais no TO.
        const fromSnap = await tx.get(fromRef);
        const fromU = fromSnap.exists()? Number(fromSnap.data().qtyUnits||0):0;
        const fromP = fromSnap.exists()? Number(fromSnap.data().qtyPallets||0):0;
        const fromType = fromSnap.exists()? (fromSnap.data().slotType||"PICKING") : "PICKING";

        const toSnap = await tx.get(toRef);
        const toU = toSnap.exists()? Number(toSnap.data().qtyUnits||0):0;
        const toP = toSnap.exists()? Number(toSnap.data().qtyPallets||0):0;
        const toType = toSnap.exists()? (toSnap.data().slotType||fromType) : fromType;

        const nextFromU = fromU - dU;
        const nextFromP = fromP - dP;
        const nextToU = toU + dU;
        const nextToP = toP + dP;

        if(nextFromU < 0 || nextFromP < 0 || nextToU < 0 || nextToP < 0) throw new Error("Edição inválida: stock ficaria negativo.");

        writes.push((tx)=>{
          if(nextFromU===0 && nextFromP===0) tx.delete(fromRef);
          else tx.set(fromRef, { positionId:from, productId:prod, palletBarcode:normalizeBarcode(pal), slotType:fromType, qtyUnits:nextFromU, qtyPallets:nextFromP, updatedAt:serverTimestamp() }, {merge:true});

          if(nextToU===0 && nextToP===0) tx.delete(toRef);
          else tx.set(toRef, { positionId:to, productId:prod, palletBarcode:normalizeBarcode(pal), slotType:toType, qtyUnits:nextToU, qtyPallets:nextToP, updatedAt:serverTimestamp() }, {merge:true});
        });
      }

      // 2) WRITES (after all reads)
      tx.set(mvRef, {
        edited:true,
        editedAt:serverTimestamp(),
        editedBy:user.uid,
        editedByEmail:(user.email||""),
        editReason:reason,
        prev: { qtyUnits:oldU, qtyPallets:oldP, slotType: mv.slotType || "" },
        qtyUnits:newU,
        qtyPallets:newP,
        ...(patch.slotType ? { slotType: patch.slotType } : {})
      }, {merge:true});

      for(const w of writes) w(tx);

      const mv2Ref = doc(collection(db, COL_MOVEMENTS));
      tx.set(mv2Ref, { type:"EDICAO", ts:serverTimestamp(), userId:user.uid, userEmail:(user.email||""), refMovementId:mvId, reason }, {merge:true});
    });
    invalidateDerivedCaches();
  }

  function generatePalletCode(prefix){
    const p = (prefix||"PLT").trim().toUpperCase().replace(/[^A-Z0-9_-]/g,"") || "PLT";
    const d = new Date();
    const y = d.getFullYear().toString();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    const ss = String(d.getSeconds()).padStart(2,"0");
    const rand = String(Math.floor(Math.random()*100000)).padStart(5,"0");
    return `${p}-${y}${m}${day}-${hh}${mm}${ss}-${rand}`;
  }

  // ===== Mapa Armazém (separador integrado) =====
  function renderMapa(){
    stopMapRealtime();

    const MAP_CAP_KEY = "wh_map_capacity_v1"; // legacy/fallback local
    const MAP_LAYOUT_DOC = "mapLayout";

    function loadMapCapFallback(){
      try{ return JSON.parse(localStorage.getItem(MAP_CAP_KEY) || "{}"); }
      catch(e){ return {}; }
    }
    function saveMapCapFallback(obj){
      try{ localStorage.setItem(MAP_CAP_KEY, JSON.stringify(obj || {})); }catch(e){}
    }

    const localCapacityFallback = loadMapCapFallback();
    let capacity = {};
    let corridorConfig = {};
    let mapLayoutLoaded = false;
    let mapLastPayload = null;
    let mapCurrentSlots = [];
    let mapCurrentAllSlots = [];
    let mapCurrentProductMap = new Map();
    let mapCurrentProblems = [];

    function cleanMapCode(code, fallback){
      const raw = String(code || fallback || "").trim();
      return raw ? raw.toUpperCase() : "SEM-CODIGO";
    }

    function naturalCompare(a,b){
      return String(a || "").localeCompare(String(b || ""), "pt", { numeric:true, sensitivity:"base" });
    }

    function parseMapCode(code){
      const c = cleanMapCode(code);
      const rowMatch = c.match(/^([A-ZÀ-Ý]+)/i);
      const nums = c.match(/\d+/g);
      if(!rowMatch || !nums || !nums.length) return null;
      return {
        row: rowMatch[1].toUpperCase(),
        nums: nums.map(n=>parseInt(n,10)).filter(n=>Number.isFinite(n)),
        code:c
      };
    }

    function hydrateCapacityFromPositions(positions){
      capacity = {};
      (positions || []).forEach(p=>{
        const code = cleanMapCode(p.code, p.id);
        const remote = Number(p.capacity);
        const local = Number(localCapacityFallback[code]);
        if(Object.prototype.hasOwnProperty.call(p, "capacity") && Number.isFinite(remote) && remote >= 0){
          capacity[code] = remote;
        }else if(Number.isFinite(local) && local >= 0){
          capacity[code] = local;
        }else{
          capacity[code] = 1;
        }
      });
    }

    function capFor(code){
      const c = cleanMapCode(code);
      if(Object.prototype.hasOwnProperty.call(capacity, c)){
        const n = Number(capacity[c]);
        return Number.isFinite(n) && n >= 0 ? n : 0;
      }
      return 1;
    }

    function zoneFor(slot){
      const z = slot && slot.raw && slot.raw.zone ? String(slot.raw.zone).trim() : "";
      return z || "Sem zona";
    }

    function corridorEveryFor(row){
      const key = cleanMapCode(row);
      const n = Number(corridorConfig[key]);
      return Number.isFinite(n) && n > 0 ? Math.floor(n) : 8;
    }

    function productNameFor(productMap, productId){
      const product = productMap.get(productId);
      return product && product.name ? product.name : (productId || "?");
    }

    function productSearchText(productMap, productId){
      const p = productMap.get(productId);
      if(!p) return String(productId || "");
      const bars = Array.isArray(p.barcodes) ? p.barcodes.join(" ") : (p.barcode || "");
      return `${p.name || ""} ${p.id || productId || ""} ${bars}`;
    }

    function stockLinePalletCount(s){
      const p = Number(s && s.qtyPallets || 0);
      const u = Number(s && s.qtyUnits || 0);
      return p > 0 ? p : (u > 0 ? 1 : 0);
    }

    function stockPalletCount(stocks){
      return (stocks || []).reduce((acc,s)=>acc + stockLinePalletCount(s), 0);
    }

    function formatMapQty(n){
      const num = Number(n || 0);
      return Number.isFinite(num) ? num.toLocaleString("pt-PT") : "0";
    }

    function formatDate(ts){
      try{
        const d = ts && typeof ts.toDate === "function" ? ts.toDate() : (ts ? new Date(ts) : null);
        if(!d || isNaN(d.getTime())) return "—";
        return d.toLocaleString("pt-PT");
      }catch(_e){ return "—"; }
    }

    function occupancyPercent(palletCount, cap){
      if(!(Number(cap) > 0)) return 0;
      return Math.round((Number(palletCount || 0) / Number(cap)) * 100);
    }

    function slotProductSummary(slot, productMap){
      const byProduct = new Map();
      (slot.stocks || []).forEach(s=>{
        const productId = s.productId || "SEM-PRODUTO";
        const productName = productNameFor(productMap, productId);
        if(!byProduct.has(productId)){
          byProduct.set(productId, { productId, productName, pallets:0, units:0, lines:0, palletCodes:new Set() });
        }
        const row = byProduct.get(productId);
        row.pallets += stockLinePalletCount(s);
        row.units += Number(s.qtyUnits || 0);
        row.lines += 1;
        const pal = normalizeBarcode(s.palletBarcode || "");
        if(pal) row.palletCodes.add(pal);
      });
      return Array.from(byProduct.values()).sort((a,b)=>naturalCompare(a.productName, b.productName));
    }

    function slotStateLabel(visual){
      if(visual.stateClass === "full") return "CHEIO";
      if(visual.stateClass === "overflow") return "EXCESSO";
      if(visual.stateClass === "partial") return "PARCIAL";
      if(visual.stateClass === "empty") return "VAZIO";
      if(visual.stateClass === "picking-over") return "PICKING EXCESSO OK";
      if(visual.stateClass === "picking-ok") return "PICKING";
      return "SEM CAPACIDADE";
    }

    function csvCell(v){
      const s = String(v ?? "");
      return /[;"\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    }

    function mapStateKey(visual){
      if(visual.stateClass === "empty") return "empty";
      if(visual.stateClass === "partial") return "partial";
      if(visual.stateClass === "full") return "full";
      if(visual.stateClass === "overflow") return "overflow";
      if(visual.stateClass === "picking-ok" || visual.stateClass === "picking-over") return "picking";
      return "no-cap";
    }

        const row = [
          slot.posCode,
          zoneFor(slot),
          slot.row || "",
          visual.cap,
          visual.palletCount,
          totalUnits,
          visual.cap > 0 ? visual.occupancy : "",
          visual.slotType || "VAZIO",
          slotStateLabel(visual),
          productText,
          (visual.alerts || []).join(" | ")
        ];
        lines.push(row.map(csvCell).join(";"));

      (slots || []).slice().sort((a,b)=>naturalCompare(a.posCode,b.posCode)).forEach(slot=>{
        const visual = slotVisual(slot, productMap, true);
        if(!(slot.stocks || []).length){
          lines.push([slot.posCode, zoneFor(slot), "", "", "", "", "", "", 0, 0, visual.cap, slotStateLabel(visual), visual.cap > 0 ? visual.occupancy : ""].map(csvCell).join(";"));
          return;
        }
        (slot.stocks || []).forEach(s=>{
          const row = [

            normalizeBarcode(s.palletBarcode || ""),

            slotStateLabel(visual),

          ];
          lines.push(row.map(csvCell).join(";"));
        });

      const quickMover = $("mapQuickMover");

        function syncQuickBtns(){
          const hasPal = !!quickSel.value;
          if(quickMover) quickMover.disabled = !hasPal;
          if(quickAjustar) quickAjustar.disabled = !hasPal;
          if(quickEliminar) quickEliminar.disabled = !hasPal;
        }
        quickSel.addEventListener("change", syncQuickBtns);
        if(quickMover) quickMover.onclick = ()=>{ if(quickSel.value) openOperationForPallet("mudar", quickSel.value); };
        if(quickAjustar) quickAjustar.onclick = ()=>{ if(quickSel.value) openOperationForPallet("retirar", quickSel.value); };
        if(quickEliminar) quickEliminar.onclick = ()=>{ if(quickSel.value) openOperationForPallet("eliminar", quickSel.value); };
      }

        btn.onclick = ()=>openOperationForPallet(btn.getAttribute("data-map-act"), btn.getAttribute("data-pal"));
      });

      loadPositionHistory(slot);

    async function loadPositionHistory(slot){
      const box = $("mapHistoryBox");
      const refreshBtn = $("mapRefreshHistory");
      if(!box || !slot) return;
      const oldBtnText = refreshBtn ? refreshBtn.textContent : "";
      if(refreshBtn){ refreshBtn.disabled = true; refreshBtn.textContent = "A atualizar..."; }
      box.innerHTML = `<div class="map-empty-note">A carregar histórico...</div>`;

      function moveTime(m){
        try{ return m.ts && typeof m.ts.toDate === "function" ? m.ts.toDate().getTime() : (m.ts ? new Date(m.ts).getTime() : 0); }
        catch(_e){ return 0; }
      }
      function positionMatchesMovement(m){
        const keys = [slot.posId, slot.posCode, slot.raw && slot.raw.code, slot.raw && slot.raw.barcode]
          .map(x=>String(x || "").trim()).filter(Boolean);
        const fields = [
          m.positionId, m.fromPositionId, m.toPositionId,
          m.positionCode, m.fromPositionCode, m.toPositionCode,
          m.locationCode, m.fromLocationCode, m.toLocationCode
        ].map(x=>String(x || "").trim()).filter(Boolean);
        return keys.some(k=>fields.includes(k));
      }
      function posLabel(idOrCode){
        const key = String(idOrCode || "").trim();
        if(!key) return "—";
        const found = (mapCurrentAllSlots || []).find(p=>p.posId === key || p.posCode === key || String(p.raw && p.raw.barcode || "") === key);
        return found ? found.posCode : key;
      }

      try{
        let result = [];
        let sourceMode = "recentes";
        try{
          const qy = query(collection(db, COL_MOVEMENTS), orderBy("ts", "desc"), limit(350));
          const snap = await getDocs(qy);
          result = snap.docs.map(d=>({ id:d.id, ...d.data() })).filter(positionMatchesMovement);
        }catch(_recentErr){
          sourceMode = "por campo";
          const fields = ["positionId", "fromPositionId", "toPositionId"];
          const keys = [slot.posId, slot.posCode].map(x=>String(x || "").trim()).filter(Boolean);
          for(const field of fields){
            for(const key of keys){
              try{
                const qy = query(collection(db, COL_MOVEMENTS), where(field, "==", key), limit(50));
                const snap = await getDocs(qy);
                snap.docs.forEach(d=>result.push({ id:d.id, ...d.data(), _match:field }));
              }catch(_e){}
            }
          }
        }

        const seen = new Set();
        const rows = result.filter(r=>{
          if(seen.has(r.id)) return false;
          seen.add(r.id);
          return true;
        }).sort((a,b)=>moveTime(b) - moveTime(a)).slice(0,40);

        if(!rows.length){
          box.innerHTML = `<div class="map-empty-note">Sem movimentos encontrados para esta posição. Tentei procurar por <b>${esc(slot.posCode)}</b> e pelo ID da posição.</div>`;
          return;
        }
        box.innerHTML = `
          <div class="map-empty-note" style="margin-bottom:8px">Histórico atualizado: ${rows.length} movimento(s) encontrado(s) (${esc(sourceMode)}).</div>
          <div class="map-detail-table-wrap">
            <table class="map-detail-table">
              <thead><tr><th>Data</th><th>Tipo</th><th>Utilizador</th><th>Palete</th><th>Produto</th><th>Origem</th><th>Destino</th><th>Qtd</th></tr></thead>
              <tbody>${rows.map(m=>`<tr>
                <td>${esc(formatDate(m.ts))}</td>
                <td><b>${esc(m.type || "—")}</b></td>
                <td>${esc(displayUser(m) || "—")}</td>
                <td>${esc(m.palletBarcode || m.destPalletBarcode || "—")}</td>
                <td>${esc(productNameFor(mapCurrentProductMap, m.productId) || m.productId || "—")}</td>
                <td>${esc(posLabel(m.fromPositionId || m.positionId || m.fromPositionCode || m.positionCode || ""))}</td>
                <td>${esc(posLabel(m.toPositionId || m.toPositionCode || ""))}</td>
                <td>${formatMapQty(m.qtyPallets || 0)} pal / ${formatMapQty(m.qtyUnits || 0)} und</td>
              </tr>`).join("")}</tbody>
            </table>
          </div>`;
      }catch(err){
        box.innerHTML = `<div class="map-empty-note">Erro ao carregar histórico: ${esc(err && err.message ? err.message : err)}</div>`;
      }finally{
        if(refreshBtn){ refreshBtn.disabled = false; refreshBtn.textContent = oldBtnText || "Atualizar histórico"; }
      }
    }

    function bindMapSlotClicks(allPositions, productMap){
      const byId = new Map((allPositions || []).map(p=>[String(p.posId || ""), p]));
      viewEl.querySelectorAll("#mapPage .slot[data-map-pos-id]").forEach(el=>{
        el.onclick = (ev)=>{
          ev.preventDefault();
          ev.stopPropagation();
          const slot = byId.get(String(el.getAttribute("data-map-pos-id") || ""));
          if(slot) showMapPositionPopup(slot, productMap);
        };
      });
    }

    function detectProblems(allPositions, stockItems, productMap){
      const posIds = new Set((allPositions || []).map(p=>p.posId));
      const byPallet = new Map();
      const problems = [];
      (stockItems || []).forEach(s=>{
        if(s.palletBarcode){
          const p = normalizeBarcode(s.palletBarcode);
          if(!byPallet.has(p)) byPallet.set(p, []);
          byPallet.get(p).push(s);
        }
        if(s.positionId && !posIds.has(s.positionId)) problems.push({level:"danger", text:`Stock com posição inexistente: ${s.positionId}`, posId:s.positionId});
        if(s.productId && !productMap.has(s.productId)) problems.push({level:"warn", text:`Stock com produto não encontrado: ${s.productId}`, posId:s.positionId});
        if(Number(s.qtyUnits || 0) < 0 || Number(s.qtyPallets || 0) < 0) problems.push({level:"danger", text:`Quantidade negativa em ${s.positionId || "?"} / ${s.palletBarcode || "?"}`, posId:s.positionId});
      });
      byPallet.forEach((rows,pal)=>{
        const keys = new Set(rows.map(r=>`${r.positionId || ""}__${r.productId || ""}`));
        if(rows.length > 1 && keys.size > 1) problems.push({level:"danger", text:`Palete duplicada em stock: ${pal} (${rows.length} linhas)`, pallet:pal});
      });
      (allPositions || []).forEach(slot=>{
        const visual = slotVisual(slot, productMap, true);
        if(visual.cap <= 0) problems.push({level:"warn", text:`Posição sem capacidade definida: ${slot.posCode}`, posId:slot.posId});
        if(visual.stateClass === "overflow") problems.push({level:"danger", text:`Posição acima da capacidade: ${slot.posCode} (${visual.palletCount}/${visual.cap})`, posId:slot.posId});
      });
      return problems;
    }

    function renderProblemPanel(problems){
      const box = $("mapProblemList");
      const count = $("mapProblemCount");
      if(count) count.textContent = String((problems || []).length);
      if(!box) return;
      if(!(problems || []).length){
        box.innerHTML = `<div class="map-empty-note">Sem alertas detetados no mapa.</div>`;
        return;
      }
      box.innerHTML = problems.slice(0,80).map(p=>`<div class="map-problem ${p.level === "danger" ? "danger" : "warn"}"><b>${p.level === "danger" ? "Crítico" : "Aviso"}</b><span>${esc(p.text)}</span></div>`).join("");
    }

    function slotVisual(slot, productMap, metaOnly){
      const cap = capFor(slot.posCode);
      const stocks = slot.stocks || [];
      const hasCompleta = stocks.some(s=>String(s.slotType || "").toUpperCase() === "COMPLETA");
      const slotType = stocks.length === 0 ? null : (hasCompleta ? "COMPLETA" : "PICKING");
      const palletCount = stockPalletCount(stocks);
      const totalUnits = stocks.reduce((acc,s)=>acc + Number(s.qtyUnits || 0), 0);
      const occupancy = occupancyPercent(palletCount, cap);
      const barWidth = Math.max(0, Math.min(100, occupancy));
      const productCount = slotProductSummary(slot, productMap).length;
      const alerts = [];

      let stateClass = "";
      let typeLabel = "";
      if(slotType === null){
        stateClass = cap > 0 ? "empty" : "no-cap";
        if(cap <= 0) alerts.push("Sem capacidade configurada");
      }else if(slotType === "COMPLETA"){
        if(cap <= 0){ stateClass = "partial"; alerts.push("Sem capacidade configurada"); }
        else if(palletCount < cap) stateClass = "partial";
        else if(palletCount === cap) stateClass = "full";
        else { stateClass = "overflow"; alerts.push("Acima da capacidade"); }
        typeLabel = `<span class="slot-type type-badge-completa">COMP</span>`;
      }else{
        stateClass = (palletCount > cap && cap > 0) ? "picking-over" : "picking-ok";
        if(cap <= 0) alerts.push("Sem capacidade configurada");
        typeLabel = `<span class="slot-type type-badge-picking">PICK</span>`;
      }
      if(stocks.some(s=>Number(s.qtyUnits || 0) < 0 || Number(s.qtyPallets || 0) < 0)) alerts.push("Quantidade negativa");
      if(stocks.some(s=>s.productId && !productMap.has(s.productId))) alerts.push("Produto não encontrado");

      let statusStr = "";
      if(stateClass === "full") statusStr = `<span class="tt-ok">CHEIO</span>`;
      else if(stateClass === "overflow") statusStr = `<span class="tt-danger">EXCESSO</span>`;
      else if(stateClass === "partial") statusStr = `<span class="tt-warn">PARCIAL</span>`;
      else if(stateClass === "empty") statusStr = `<span style="color:var(--map-muted)">VAZIO</span>`;
      else if(stateClass === "picking-over") statusStr = `<span class="tt-pick">PICKING EXCESSO (OK)</span>`;
      else if(stateClass === "picking-ok") statusStr = `<span class="tt-pick">PICKING</span>`;
      else statusStr = `<span style="color:var(--map-muted)">SEM CAP.</span>`;

      const prodList = stocks.slice(0,8).map(s=>{
        const pName = productNameFor(productMap, s.productId);
        const shownPal = stockLinePalletCount(s);
        const und = Number(s.qtyUnits || 0);
        return `• ${esc(pName)} (${shownPal} pal, ${und} und)`;
      }).join("<br>");
      const moreTxt = stocks.length > 8 ? `<br>+ ${stocks.length - 8} linha(s)` : "";

      const capStr = cap > 0 ? formatMapQty(cap) : "—";
      const occStr = cap > 0 ? `${occupancy}%` : "—";
      const alertBadge = alerts.length ? `<div class="map-alert-badge">⚠️</div>` : "";
      const zoneBadge = `<div class="map-zone-badge">${esc(zoneFor(slot))}</div>`;
      const tooltip = `
        <div class="tooltip">
          <div class="tt-row"><strong>${esc(slot.posCode)}</strong>${statusStr}</div>
          <div class="tt-row"><span style="color:var(--map-muted)">Zona:</span><span>${esc(zoneFor(slot))}</span></div>
          <div class="tt-row"><span style="color:var(--map-muted)">Paletes:</span><span>${formatMapQty(palletCount)} / ${capStr}</span></div>
          <div class="tt-row"><span style="color:var(--map-muted)">Ocupação:</span><span>${occStr}</span></div>
          <div class="tt-row"><span style="color:var(--map-muted)">Produtos:</span><span>${formatMapQty(productCount)}</span></div>
          <div class="tt-row"><span style="color:var(--map-muted)">UND:</span><span>${formatMapQty(totalUnits)}</span></div>
          ${alerts.length ? `<div style="margin-top:7px;color:var(--map-danger);font-size:11px">${alerts.map(esc).join("<br>")}</div>` : ""}
          ${stocks.length ? `<div style="margin-top:7px;color:var(--map-muted);font-size:11px">${prodList}${moreTxt}</div>` : `<div style="margin-top:7px;color:var(--map-muted);font-size:11px">Sem stock</div>`}
        </div>`;

      const result = { cap, palletCount, slotType, stateClass, occupancy, totalUnits, alerts };
      if(metaOnly) return result;
      result.html = `
          <div class="slot ${stateClass}" style="flex:1" data-map-pos-id="${esc(slot.posId || "")}" data-map-pos-code="${esc(slot.posCode || "")}" title="Clique para ver detalhe da posição">
            ${alertBadge}
            ${zoneBadge}
            <div class="slot-id">${esc(slot.posCode)}</div>
            <div class="slot-count">${formatMapQty(palletCount)}</div>
            <div class="slot-cap">/ ${capStr} • ${occStr}</div>
            <div class="map-progress" aria-hidden="true"><div class="map-progress-fill" style="width:${barWidth}%"></div></div>
            ${typeLabel}
            ${tooltip}
          </div>`;
      return result;
    }

        </style>

        <header class="map-head">

          <div class="map-leg-item"><div class="map-leg-dot" style="background:rgba(255,94,94,.15);border:1px solid rgba(255,94,94,.4)"></div> Excesso</div>
          <div class="map-leg-item"><div class="map-leg-dot" style="background:rgba(123,156,255,.12);border:1px solid rgba(123,156,255,.4)"></div> Picking</div>

        <div class="map-layout">
          <div class="map-main-panel">
            <div class="map-section-title"><h3>Posições por fila</h3><span>Geradas automaticamente pelos códigos registados</span></div>
