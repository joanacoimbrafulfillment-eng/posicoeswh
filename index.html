    const statusEl = $("mapStatus");
    const loadEl = $("mapLoad");
    const gridEl = $("mapGrid");
    const cfgPanel = $("mapCfgPanel");
    const cfgGrid = $("mapCfgGrid");
    const corridorGrid = $("mapCorridorGrid");
    const extraEl = $("mapExtra");
    const extraCountEl = $("mapExtraCount");
    const modalEl = $("mapModal");
    const modalCloseEl = $("mapModalClose");

    function syncAppHeaderOffset(){
      const h = document.querySelector("#appShell > header");
      const px = h ? Math.ceil(h.getBoundingClientRect().height) : 0;
      document.documentElement.style.setProperty("--app-header-h", px + "px");
      return px;
    }
    syncAppHeaderOffset();
    if(!state.mapHeaderOffsetBound){
      state.mapHeaderOffsetBound = true;
      window.addEventListener("resize", syncAppHeaderOffset, { passive:true });
    }

    const searchEl = $("mapSearch");
    const stateFilterEl = $("mapStateFilter");
    const typeFilterEl = $("mapTypeFilter");
    const zoneFilterEl = $("mapZoneFilter");
    const filterHintEl = $("mapFilterHint");
    const cfgHintEl = $("mapCfgHint");

    function openMapModal(){
      if(!modalEl) return;
      syncAppHeaderOffset();
      modalEl.style.display = "flex";
      modalEl.setAttribute("aria-hidden", "false");
      document.body.classList.add("map-modal-open");
    }

    function closeMapModal(){
      if(modalEl){
        modalEl.style.display = "none";
        modalEl.setAttribute("aria-hidden", "true");
      }
      document.body.classList.remove("map-modal-open");
    }

    if(modalCloseEl) modalCloseEl.onclick = closeMapModal;
    if(modalEl) modalEl.addEventListener("click", (ev)=>{ if(ev.target === modalEl) closeMapModal(); });
    document.addEventListener("keydown", (ev)=>{ if(ev.key === "Escape" && modalEl && modalEl.style.display === "flex") closeMapModal(); }, { once:false });

    $("mapToggleCfg").onclick = ()=>{
      cfgPanel.style.display = cfgPanel.style.display === "none" || !cfgPanel.style.display ? "block" : "none";
    };
    $("mapReload").onclick = ()=>loadAndRenderMap();
    $("mapExportSummaryCsv").onclick = ()=>{
      const slots = mapCurrentSlots && mapCurrentSlots.length ? mapCurrentSlots : mapCurrentAllSlots;
      const isFiltered = slots.length < mapCurrentAllSlots.length;
      const label = isFiltered ? `(${slots.length}/${mapCurrentAllSlots.length} filtradas)` : `(${slots.length} total)`;
      const btn = $("mapExportSummaryCsv");
      const orig = btn ? btn.textContent : "";
      if(btn){ btn.textContent = `A exportar ${label}...`; btn.disabled = true; }
      try{ downloadMapSummaryCSV(slots, mapCurrentProductMap); }finally{ if(btn){ btn.textContent = orig; btn.disabled = false; } }
    };
    $("mapExportDetailCsv").onclick = ()=>{
      const slots = mapCurrentSlots && mapCurrentSlots.length ? mapCurrentSlots : mapCurrentAllSlots;
      const isFiltered = slots.length < mapCurrentAllSlots.length;
      const label = isFiltered ? `(${slots.length}/${mapCurrentAllSlots.length} filtradas)` : `(${slots.length} total)`;
      const btn = $("mapExportDetailCsv");
      const orig = btn ? btn.textContent : "";
      if(btn){ btn.textContent = `A exportar ${label}...`; btn.disabled = true; }
      try{ downloadMapDetailCSV(slots, mapCurrentProductMap); }finally{ if(btn){ btn.textContent = orig; btn.disabled = false; } }
    };
    [searchEl,stateFilterEl,typeFilterEl,zoneFilterEl].forEach(el=>{
      if(el) el.addEventListener("input", ()=>{
        if(mapLastPayload) renderMapData(mapLastPayload.positions, mapLastPayload.stockItems, mapLastPayload.productMap);
      });
      if(el) el.addEventListener("change", ()=>{
        if(mapLastPayload) renderMapData(mapLastPayload.positions, mapLastPayload.stockItems, mapLastPayload.productMap);
      });
    });

    async function loadLayoutConfig(){
      try{
        const snap = await getDoc(doc(db, COL_CONFIG, MAP_LAYOUT_DOC));
        if(snap.exists()){
          const data = snap.data() || {};
          corridorConfig = data.rowCorridors || data.corridors || {};
        }
      }catch(_e){ corridorConfig = corridorConfig || {}; }
      mapLayoutLoaded = true;
    }

    async function loadAndRenderMap(){
      if(statusEl) statusEl.textContent = "A carregar…";
      if(loadEl){ loadEl.style.display = "block"; loadEl.textContent = "A carregar posições e stock..."; }
      if(gridEl) gridEl.style.display = "none";
      if(extraEl) extraEl.innerHTML = `<div class="map-empty-note">A carregar restantes posições...</div>`;

      try{
        await loadLayoutConfig();
        const [posSnap, stockSnap, prodSnap] = await Promise.all([
          getDocs(collection(db, COL_POSITIONS)),
          getDocs(collection(db, COL_STOCK)),
          getDocs(collection(db, COL_PRODUCTS))
        ]);
        applyMapSnapshots(posSnap, stockSnap, prodSnap, "manual");
      }catch(err){
        showMapLoadError(err);
      }
    }

    function showMapLoadError(err){
      if(statusEl){ statusEl.textContent = "Erro"; statusEl.className = "map-pill err"; }
      if(loadEl){ loadEl.style.display = "block"; loadEl.textContent = "Erro: " + (err && err.message ? err.message : err); }
    }

    function applyMapSnapshots(posSnap, stockSnap, prodSnap, mode){
      const positions = posSnap.docs.map(d=>({ id:d.id, ...d.data() }));
      const stockItems = stockSnap.docs.map(d=>({ id:d.id, ...d.data() }));
      const products = prodSnap.docs.map(d=>({ id:d.id, ...d.data() }));
      const productMap = new Map(products.map(p=>[p.id, p]));
      hydrateCapacityFromPositions(positions);
      mapLastPayload = { positions, stockItems, productMap };
      if(statusEl){
        statusEl.innerHTML = `${mode === "live" ? "Live" : "OK"} • ${positions.length} posições • ${stockItems.length} linhas stock`;
        statusEl.className = "map-pill ok";
      }
      if(loadEl) loadEl.style.display = "none";
      if(gridEl) gridEl.style.display = "inline-flex";
      renderMapData(positions, stockItems, productMap);
    }

    function startRealtimeMap(){
      let posSnap=null, stockSnap=null, prodSnap=null;
      const maybeRender = ()=>{
        if(posSnap && stockSnap && prodSnap && mapLayoutLoaded) applyMapSnapshots(posSnap, stockSnap, prodSnap, "live");
      };
      const onErr = err=>showMapLoadError(err);
      const unsubs = [];
      unsubs.push(onSnapshot(doc(db, COL_CONFIG, MAP_LAYOUT_DOC), snap=>{
        const data = snap.exists() ? (snap.data() || {}) : {};
        corridorConfig = data.rowCorridors || data.corridors || {};
        mapLayoutLoaded = true;
        maybeRender();
      }, onErr));
      unsubs.push(onSnapshot(collection(db, COL_POSITIONS), snap=>{ posSnap=snap; maybeRender(); }, onErr));
      unsubs.push(onSnapshot(collection(db, COL_STOCK), snap=>{ stockSnap=snap; maybeRender(); }, onErr));
      unsubs.push(onSnapshot(collection(db, COL_PRODUCTS), snap=>{ prodSnap=snap; maybeRender(); }, onErr));
      state.mapRealtimeUnsubs = unsubs;
    }

    function buildCfgGrid(allPositions, rowNames){
      const zones = Array.from(new Set(allPositions.map(p=>zoneFor(p)).filter(Boolean))).sort(naturalCompare);
      const sorted = [...allPositions].sort((a,b)=>naturalCompare(a.posCode, b.posCode));
      cfgGrid.innerHTML = sorted.map(p=>`
        <div class="map-cfg-cell">
          <div class="pos-label">${esc(p.posCode)}</div>
          <input type="number" min="0" max="99" data-pos-id="${esc(p.posId)}" data-pos="${esc(p.posCode)}" value="${capFor(p.posCode)}" placeholder="1">
          <select data-zone-pos-id="${esc(p.posId)}" data-zone-pos="${esc(p.posCode)}">
            ${zones.concat(["Picking","Reserva","Embalado","Devoluções","Novo","Bloqueado","Expedição","Sem zona"]).filter((v,i,a)=>a.indexOf(v)===i).map(z=>`<option value="${esc(z === "Sem zona" ? "" : z)}" ${zoneFor(p)===z ? "selected" : ""}>${esc(z)}</option>`).join("")}
          </select>
        </div>
      `).join("") || `<div style="color:var(--map-muted);font-size:13px">Sem posições para configurar.</div>`;

      corridorGrid.innerHTML = (rowNames || []).map(row=>`
        <div class="map-corridor-cell">
          <label>Fila ${esc(row)}</label>
          <input type="number" min="0" max="99" data-row="${esc(row)}" value="${corridorEveryFor(row)}" placeholder="8">
        </div>
      `).join("") || `<div style="color:var(--map-muted);font-size:13px">Sem filas configuráveis.</div>`;

      $("mapSaveCfg").onclick = async ()=>{
        try{
          if(cfgHintEl) cfgHintEl.textContent = "A guardar no Firestore...";
          const batch = writeBatch(db);
          const localCopy = {};
          cfgGrid.querySelectorAll("input[data-pos-id]").forEach(inp=>{
            const vRaw = parseInt(inp.value,10);
            const v = Number.isFinite(vRaw) && vRaw >= 0 ? vRaw : 0;
            const key = cleanMapCode(inp.dataset.pos);
            capacity[key] = v;
            localCopy[key] = v;
            const posId = inp.dataset.posId;
            if(posId){
              batch.set(doc(db, COL_POSITIONS, posId), { capacity:v, updatedAt:serverTimestamp() }, { merge:true });
            }
          });
          cfgGrid.querySelectorAll("select[data-zone-pos-id]").forEach(sel=>{
            const posId = sel.dataset.zonePosId;
            if(posId) batch.set(doc(db, COL_POSITIONS, posId), { zone:String(sel.value || "").trim(), updatedAt:serverTimestamp() }, { merge:true });
          });
          const newCorridors = {};
          corridorGrid.querySelectorAll("input[data-row]").forEach(inp=>{
            const vRaw = parseInt(inp.value,10);
            const v = Number.isFinite(vRaw) && vRaw > 0 ? vRaw : 0;
            const row = cleanMapCode(inp.dataset.row);
            if(v > 0) newCorridors[row] = v;
          });
          corridorConfig = newCorridors;
          saveMapCapFallback(localCopy);
          batch.set(doc(db, COL_CONFIG, MAP_LAYOUT_DOC), { rowCorridors:newCorridors, updatedAt:serverTimestamp() }, { merge:true });
          await batch.commit();
          if(cfgHintEl) cfgHintEl.textContent = "✅ Guardado no Firestore.";
          cfgPanel.style.display = "none";
        }catch(err){
          if(cfgHintEl) cfgHintEl.textContent = "❌ Erro ao guardar: " + (err && err.message ? err.message : err);
        }
      };

      $("mapSetAll").onclick = ()=>{
        const v = parseInt($("mapAllVal").value,10) || 1;
        cfgGrid.querySelectorAll("input[data-pos]").forEach(inp=>{ inp.value = v; });
      };
    }

    function updateZoneFilter(allPositions){
      if(!zoneFilterEl) return;
      const current = zoneFilterEl.value;
      const zones = Array.from(new Set(allPositions.map(p=>zoneFor(p)).filter(Boolean))).sort(naturalCompare);
      zoneFilterEl.innerHTML = `<option value="">Todas as zonas</option>` + zones.map(z=>`<option value="${esc(z)}">${esc(z)}</option>`).join("");
      if(zones.includes(current)) zoneFilterEl.value = current;
    }

    function renderMapStats(allSlots){
      let totalSlots=0, emptySlots=0, fullSlots=0, partialSlots=0, overflowSlots=0, pickingSlots=0, noCapSlots=0;
      (allSlots || []).forEach(slot=>{
        if(!slot.posCode) return;
        totalSlots++;
        const visual = slotVisual(slot, mapCurrentProductMap, true);
        if(visual.stateClass === "no-cap") noCapSlots++;
        if(visual.slotType === null) emptySlots++;
        else if(visual.slotType === "COMPLETA"){
          if(visual.palletCount === visual.cap && visual.cap > 0) fullSlots++;
          else if(visual.palletCount > visual.cap && visual.cap > 0) overflowSlots++;
          else partialSlots++;
        }else pickingSlots++;
      });

      $("mapStats").innerHTML = `
        <div class="map-stat"><div class="n">${totalSlots}</div><div class="l">Total posições</div></div>
        <div class="map-stat"><div class="n" style="color:var(--map-muted)">${emptySlots}</div><div class="l">Vazias</div></div>
        <div class="map-stat"><div class="n warn">${partialSlots}</div><div class="l">Parciais</div></div>
        <div class="map-stat"><div class="n ok">${fullSlots}</div><div class="l">Cheias</div></div>
        <div class="map-stat"><div class="n danger">${overflowSlots}</div><div class="l">Excesso</div></div>
        <div class="map-stat"><div class="n pick">${pickingSlots}</div><div class="l">Picking</div></div>
        <div class="map-stat"><div class="n warn">${noCapSlots}</div><div class="l">Sem cap.</div></div>
      `;
    }

    function renderMapData(positions, stockItems, productMap){
      const stockByPos = {};
      stockItems.forEach(s=>{
        const pid = s.positionId;
        if(!pid) return;
        if(!stockByPos[pid]) stockByPos[pid] = [];
        stockByPos[pid].push(s);
      });

      const allPositions = positions.map(p=>{
        const posCode = cleanMapCode(p.code, p.id);
        const parsed = parseMapCode(posCode);
        return {
          raw:p,
          parsed,
          row: parsed ? parsed.row : null,
          sortNums: parsed ? parsed.nums : [],
          posId:p.id,
          posCode,
          stocks: stockByPos[p.id] || []
        };
      }).sort((a,b)=>naturalCompare(a.posCode, b.posCode));

      mapCurrentProductMap = productMap;
      mapCurrentAllSlots = allPositions;
      updateZoneFilter(allPositions);
      buildCfgGrid(allPositions, Array.from(new Set(allPositions.map(p=>p.row).filter(Boolean))).sort(naturalCompare));
      mapCurrentProblems = detectProblems(allPositions, stockItems, productMap);
      renderProblemPanel(mapCurrentProblems);

      const searchText = String(searchEl && searchEl.value || "").trim().toUpperCase();
      const stateFilter = String(stateFilterEl && stateFilterEl.value || "");
      const typeFilter = String(typeFilterEl && typeFilterEl.value || "");
      const zoneFilter = String(zoneFilterEl && zoneFilterEl.value || "");

      const visiblePositions = allPositions.filter(p=>{
        const visual = slotVisual(p, productMap, true);
        const stateKey = mapStateKey(visual);
        const typeKey = visual.slotType || "VAZIO";
        if(stateFilter && stateKey !== stateFilter) return false;
        if(typeFilter && typeKey !== typeFilter) return false;
        if(zoneFilter && zoneFor(p) !== zoneFilter) return false;
        if(searchText){
          const stockText = (p.stocks || []).map(s=>`${s.productId || ""} ${s.palletBarcode || ""} ${s.status || ""} ${s.origin || ""} ${s.slotType || ""} ${productSearchText(productMap, s.productId)}`).join(" ");
          const txt = `${p.posCode} ${zoneFor(p)} ${slotStateLabel(visual)} ${typeKey} ${stockText}`.toUpperCase();
          if(!txt.includes(searchText)) return false;
        }
        return true;
      });
      if(filterHintEl){
        const filterActive = searchText || stateFilter || typeFilter || zoneFilter;
        filterHintEl.textContent = filterActive ? `${visiblePositions.length}/${allPositions.length} posições` : `Sem filtro • ${allPositions.length} posições`;
      }

      const grouped = new Map();
      const extras = [];
      visiblePositions.forEach(p=>{
        if(p.parsed){
          if(!grouped.has(p.row)) grouped.set(p.row, []);
          grouped.get(p.row).push(p);
        }else extras.push(p);
      });

      const rowNames = Array.from(grouped.keys()).sort(naturalCompare);
      rowNames.forEach(row=>{
        grouped.get(row).sort((a,b)=>{
          const len = Math.max(a.sortNums.length, b.sortNums.length);
          for(let i=0;i<len;i++){
            const av = Number.isFinite(a.sortNums[i]) ? a.sortNums[i] : -1;
            const bv = Number.isFinite(b.sortNums[i]) ? b.sortNums[i] : -1;
            if(av !== bv) return av - bv;
          }
          return naturalCompare(a.posCode, b.posCode);
        });
      });

      renderMapStats(visiblePositions);
      mapCurrentSlots = visiblePositions;
      const exportHint = $("mapExportFilterHint");
      if(exportHint){
        const isFiltered = visiblePositions.length < allPositions.length;
        exportHint.style.display = isFiltered ? "inline" : "none";
        exportHint.textContent = isFiltered ? `● ${visiblePositions.length}/${allPositions.length} filtradas` : "";
      }
      gridEl.innerHTML = "";
      if(rowNames.length === 0){
        gridEl.style.display = "block";
        gridEl.innerHTML = `<div class="map-empty-note">Não há posições com código do tipo fila+número para este filtro. As posições registadas fora do padrão aparecem na coluna lateral.</div>`;
      }else{
        gridEl.style.display = "inline-flex";
        rowNames.forEach(row=>{
          const rowEl = document.createElement("div");
          rowEl.className = "wh-row";
          rowEl.style.marginBottom = "8px";
          const slots = grouped.get(row) || [];
          const every = corridorEveryFor(row);
          let html = `<div class="row-label">${esc(row)}<span class="map-row-code-count">${slots.length}</span></div>`;
          slots.forEach((slot, si)=>{
            if(si > 0 && every > 0 && si % every === 0) html += `<div class="corridor-v"><div class="corridor-v-inner">CORREDOR</div></div>`;
            html += slotVisual(slot, productMap).html;
          });
          rowEl.innerHTML = html;
          gridEl.appendChild(rowEl);
        });
      }

      if(extraCountEl) extraCountEl.textContent = `${extras.length}`;
      if(extraEl){
        extraEl.innerHTML = extras.length ? extras.map(slot=>slotVisual(slot, productMap).html).join("") : `<div class="map-empty-note">Sem posições fora do padrão fila+número para este filtro.</div>`;
      }
      bindMapSlotClicks(visiblePositions, productMap);
    }

    startRealtimeMap();
  }


  function renderPallets(){
    const u = auth.currentUser;
    viewEl.innerHTML = `

        <h2 style="margin:0 0 8px">Gerador de códigos de barras (Pallets)</h2>
        <div class="hint">Gera um código único (CODE128) para colar/Imprimir e depois usar na operação (campo <b>Pallet</b>).</div>

          <div class="card soft">

            </div>

          </div>
        </div>

        <div class="divider"></div>
        <h2 style="margin:0 0 8px">Reimprimir etiqueta de PALETE</h2>

        <div class="row" style="margin-top:10px">
          <div class="field"><label>Código de Pallet</label><input id="pltReCode" placeholder="Pica o código..." /></div>
          <div class="right">
            <button class="btn ghost" id="pltReFind">Procurar</button>
            <button class="btn ok" id="pltRePrint" disabled>Imprimir</button>
          </div>

        <div id="pltReInfo" style="margin-top:10px"></div>
        <div style="margin-top:10px;overflow:auto"><svg id="pltReSvg"></svg></div>
        <div id="pltHistoryBox" style="margin-top:4px"></div>
      </div>

      <div class="card" style="margin-top:12px">
        <h2 style="margin:0 0 8px">Códigos gerados</h2>
        <div class="row" style="align-items:center;gap:10px">
          <div class="hint">Toca/clica num código para copiar. Usa “Imprimir” para uma etiqueta, ou imprime tudo (1 por folha).</div>
          <div class="spacer"></div>
          <button class="btn ok" id="pltPrintAll" disabled>Imprimir tudo (1/folha)</button>

  function setupPallets(){
    const prefix = $("pltPrefix");
    const qty = $("pltQty");
    const title = $("pltTitle");
    const sub = $("pltSub");
    const btn = $("pltGen");
    const msg = $("pltMsg");
    const list = $("pltList");
    const printAll = $("pltPrintAll");

    
    // Reimprimir
    const reCode = $("pltReCode");
    const reFind = $("pltReFind");
    const rePrint = $("pltRePrint");
    const reInfo = $("pltReInfo");
    const reSvg = $("pltReSvg");
    let reResolved = null;
let codes = [];

    function render(){
      list.innerHTML = codes.map((c, i)=>`
        <div class="card soft">
          <div class="row">
            <div class="pill mono" style="cursor:pointer" data-copy="${esc(c)}">${esc(c)}</div>
            <div class="spacer"></div>
            <button class="btn ghost" data-print="${i}">Imprimir</button>
          </div>
          <div style="margin-top:10px;overflow:auto">
            <svg id="pltSvg_${i}"></svg>
          </div>
        </div>
      `).join("") || `<div class="hint">Ainda não geraste códigos.</div>`;

      codes.forEach((c,i)=>{
        const svg = document.getElementById(`pltSvg_${i}`);
        renderBarcode(svg, c);
      });

      list.querySelectorAll("[data-copy]").forEach(el=>{
        el.onclick = async ()=>{
          const code = el.getAttribute("data-copy");
          try{
            await navigator.clipboard.writeText(code);
            msg.innerHTML = msgBox("✅ Copiado: " + esc(code), "ok");
          }catch(e){
            msg.innerHTML = msgBox("Copiar falhou (telemóvel às vezes bloqueia). Código: " + esc(code), "warn");
          }
        };
      });

      if(printAll){
        printAll.disabled = !(codes && codes.length);
        printAll.onclick = ()=>{
          if(!(codes && codes.length)) return;
          printPalletLabelsBatch({codes, title: title.value || "PALETE", subtitle: sub.value || ""});
        };
      }

      list.querySelectorAll("[data-print]").forEach(b=>{
        b.onclick = ()=>{
          const i = Number(b.getAttribute("data-print"));
          const code = codes[i];
          printPalletLabel({code, title: title.value || "PALETE", subtitle: sub.value || ""});
        };
      });
    }

    btn.onclick = ()=>{
      msg.innerHTML = "";
      const n = Math.max(1, Math.min(200, Math.floor(Number(qty.value||1))));
      const pref = prefix.value || "PLT";
      codes = Array.from({length:n}, ()=>generatePalletCode(pref));
      render();
    };

    render();
  

    async function doResolve(){
      if(!reCode || !reFind || !rePrint || !reInfo || !reSvg) return;
      const code = normalizeBarcode(reCode.value);
      if(!code){
        reInfo.innerHTML = msgBox("Pica o código de palete.", "warn");
        rePrint.disabled = true;
        reResolved = null;
        const histBox = $("pltHistoryBox");
        if(histBox) histBox.innerHTML = "";
        return;
      }
      renderBarcode(reSvg, code);

      try{
        const res = await resolvePalletGlobal(code);
        if(res.ok){
          reResolved = res;
          const s = res.stock || {};
          reInfo.innerHTML = msgBox(`Encontrado no stock • <b>${esc(res.position.code)}</b> • <b>${esc(res.product.name)}</b> • UND ${Number(s.qtyUnits||0)} • Pal ${Number(s.qtyPallets||0)}`, "ok");
          rePrint.disabled = false;
        }else if(res.reason==="multiplo"){
          reResolved = null;
          rePrint.disabled = false;
          reInfo.innerHTML = msgBox("Pallet existe em várias linhas/duplicada. Podes imprimir na mesma.", "warn");
        }else{
          reResolved = null;
          rePrint.disabled = false;
          reInfo.innerHTML = msgBox("Pallet não encontrada no stock (podes imprimir na mesma).", "warn");
        }
      }catch(e){
        reResolved = null;
        rePrint.disabled = false;
        reInfo.innerHTML = msgBox("Erro a procurar palete (podes imprimir na mesma).", "warn");
      }

      // Histórico de movimentos desta palete
      await loadPalletHistory(code);
    }

    async function loadPalletHistory(palletCode){
      const histBox = $("pltHistoryBox");
      if(!histBox) return;
      histBox.innerHTML = `<div class="hint" style="padding:8px 0">A carregar histórico...</div>`;
      try{
        const pbc = normalizeBarcode(palletCode);
        const qy = query(
          collection(db, COL_MOVEMENTS),
          where("palletBarcode", "==", pbc),
          orderBy("ts", "desc"),
          limit(50)
        );
        const snap = await getDocs(qy);
        if(snap.empty){
          histBox.innerHTML = `<div class="hint" style="padding:8px 0">Sem movimentos registados para esta palete.</div>`;
          return;
        }
        const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
        // resolver posições
        const posIds = [...new Set(rows.flatMap(r=>[r.positionId,r.fromPositionId,r.toPositionId]).filter(Boolean))];
        const posSnaps = await Promise.all(posIds.map(id=>getDoc(doc(db,COL_POSITIONS,id))));
        const posMap = new Map(posIds.map((id,i)=>[id, posSnaps[i].exists() ? (posSnaps[i].data().code||id) : id]));
        const prodIds = [...new Set(rows.map(r=>r.productId).filter(Boolean))];
        const prodSnaps = await Promise.all(prodIds.map(id=>getDoc(doc(db,COL_PRODUCTS,id))));
        const prodMap = new Map(prodIds.map((id,i)=>[id, prodSnaps[i].exists() ? (prodSnaps[i].data().name||id) : id]));

        function posLabel(id){ return id ? (posMap.get(id)||id) : "—"; }
        function tsLabel(ts){ try{ return ts&&ts.toDate?ts.toDate().toLocaleString("pt-PT"):"—"; }catch(_e){return "—";} }

        histBox.innerHTML = `
          <div style="overflow:auto;margin-top:8px;border:1px solid var(--stroke);border-radius:12px">
            <table style="font-size:12px">
              <thead><tr>
                <th>Data</th><th>Tipo</th><th>Origem</th><th>Destino</th><th>Produto</th><th>Pal</th><th>UND</th><th>User</th>
              </tr></thead>
              <tbody>
                ${rows.map(r=>`<tr style="${r.cancelled?'opacity:.5':''}">
                  <td style="white-space:nowrap">${esc(tsLabel(r.ts))}${r.cancelled?'<div style="color:var(--danger);font-size:10px">ANULADO</div>':''}</td>
                  <td><b>${esc(r.type||"—")}</b></td>
                  <td class="mono">${esc(posLabel(r.fromPositionId||r.positionId))}</td>
                  <td class="mono">${esc(posLabel(r.toPositionId)||"—")}</td>
                  <td>${esc(prodMap.get(r.productId)||r.productId||"—")}</td>
                  <td class="mono">${Number(r.qtyPallets||0)}</td>
                  <td class="mono">${Number(r.qtyUnits||0)}</td>
                  <td style="font-size:11px">${esc((r.userEmail||r.userLabel||"").split("@")[0]||"—")}</td>
                </tr>`).join("")}
              </tbody>
            </table>
          </div>
          <div class="hint" style="margin-top:6px">${rows.length} movimento(s) encontrado(s) para <b>${esc(palletCode)}</b>.</div>
        `;
      }catch(err){
        histBox.innerHTML = `<div class="hint" style="padding:8px 0;color:var(--danger)">Erro ao carregar histórico: ${esc(err&&err.message?err.message:err)}</div>`;
      }
    }

    if(reFind) reFind.onclick = doResolve;
    if(reCode) reCode.addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); doResolve(); }});
    if(rePrint) rePrint.onclick = ()=>{
      const code = normalizeBarcode(reCode.value);
      if(!code){ reInfo.innerHTML = msgBox("Pica o código de palete.", "warn"); return; }
      let subtitle = "";
      if(reResolved && reResolved.position && reResolved.product){
        subtitle = `${reResolved.position.code} • ${reResolved.product.name}`;
      }
      printPalletLabel({code, title: title.value || "PALETE", subtitle: subtitle || (sub.value || "")});
    };
}

  $("btnLogin").onclick = async ()=>{
    const box = $("authMsg");
    if(box) box.innerHTML = "";
    try{
      const email = $("loginEmail").value.trim();
      const pass  = $("loginPass").value;
      if(!email || !pass) throw new Error("Preenche email e password.");
      await signInWithEmailAndPassword(auth, email, pass);
      if(box) box.innerHTML = msgBox("✅ Login efetuado.", "ok");
    }catch(err){
      const code = err.code ? `<div class="hint">Código: <code>${esc(err.code)}</code></div>` : "";
      const msg = err.message || String(err);
      let tips = "";
      const c = (err.code || "").toString();
      if(c.includes("auth/unauthorized-domain")){
        tips = `<div class="hint">Domínio não autorizado. Publica em Firebase Hosting ou adiciona o domínio em Authentication → Settings → Authorized domains.</div>`;
      }
      if(box) box.innerHTML = msgBox(`❌ Erro de login: ${esc(msg)}${code}${tips}`, "err");
      console.error(err);
    }
  };
  $("btnLogout").onclick = async ()=>{ try{ await signOut(auth); }catch(e){} };
  $("btnReload").onclick = ()=>location.reload();

  // placeholder inicial
  viewEl.innerHTML = `<div class="card"><div class="hint">A verificar sessão...</div></div>`;

  onAuthStateChanged(auth, (user)=>{
    state.user = user || null;

    // No session -> show only login screen
    if(!state.user){
      setGate("login");
      return;
    }

    // Role check (do NOT auto-logout; show diagnostic)
    if(!canOperate(state.user)){
      const em = emailOfUser(state.user);
      const am = $("authMsg");
      if(am){
        am.innerHTML = msgBox(
          "No access for this email: <span class='mono'>"+esc(em || "(no email)")+
          "</span><br>Expected: <span class='mono'>@admin.com</span> or <span class='mono'>@wh.com</span>.",
          "err"
        );
      }
      // keep login screen visible so user can switch account
      setGate("login");
      return;
    }

    // Try to render. Show the app shell first so the fixed header can be measured correctly.
    try{
      const am=$("authMsg"); if(am) am.innerHTML = msgBox("Opening…", "warn");
      setGate("app");
      render();
      requestAnimationFrame(()=>syncFixedHeaderOffset());
    }catch(e){
      console.error(e);
      const am=$("authMsg");
      if(am) am.innerHTML = msgBox("Error opening app: "+esc(e.message||e), "err");
      setGate("login");
    }
  });

  
  // expose helpers for safety (module scope)
  window.transferReplenish = transferReplenish;
/***********************
   REGRAS FIRESTORE (colar no Firebase Console → Firestore Rules)

   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {

       function signedIn() { return request.auth != null; }
       function email() { return signedIn() ? request.auth.token.email : ""; }
       function isAdmin() { return signedIn() && email().matches('.*@admin\\.com$'); }
       function isWh()    { return signedIn() && email().matches('.*@wh\\.com$'); }
       function canOperate() { return isAdmin() || isWh(); }

       match /products/{id} {
         allow read: if canOperate();
         allow write: if isAdmin();
       }
       match /positions/{id} {
         allow read: if canOperate();
         allow write: if isAdmin();
       }
       match /stockItems/{id} {
         allow read, write: if canOperate();
       }
       match /movements/{id} {
         allow create: if canOperate();
         allow read: if canOperate();
         // permitir marcação de anulado/edição (a app faz o ajuste de stock)
         allow update: if canOperate();
         allow delete: if false;
       }
     }
   }

   ***********************/</script>
